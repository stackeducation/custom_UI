<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <style>
        :root {
            --page-bg: #F8F7F5;
            --card-bg: #ffffff;
            --card-border: #f5a631;
            --card-border-light: #FFD089;
            --angle: 0deg;
            --text-primary: #111111;
            --text-secondary: #3c372f;
            --text-tertiary: #6b6560;
            --text-disabled: #a3a3a3;
            --navy: #094074;
            --input-border: #c8c5be;
            --button-disabled: #e1dfd9;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        html {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Inter", "DM Sans", "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.42857143;
            color: var(--text-primary);
            background: var(--page-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .page {
            display: flex;
            justify-content: center;
            padding: 100px 20px;
        }

        .card {
            position: relative;
            width: 565px;
            max-width: 92vw;
            padding: 56px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            background:
                linear-gradient(var(--card-bg), var(--card-bg)) padding-box,
                conic-gradient(from var(--border-angle),
                    transparent 0deg,
                    transparent 220deg,
                    rgba(245, 166, 49, 0.12) 250deg,
                    rgba(255, 208, 137, 0.45) 270deg,
                    #fff4df 285deg,
                    var(--card-border-light) 300deg,
                    var(--card-border) 320deg,
                    var(--card-border) 340deg,
                    rgba(245, 166, 49, 0.25) 350deg,
                    transparent 360deg) border-box;
            border: 1.5px solid transparent;
            box-shadow: 0 0 20.5714px rgba(245, 166, 49, 0.12);
            animation: border-angle-rotate 5s linear infinite;
        }

        @property --border-angle {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes border-angle-rotate {
            from {
                --border-angle: 0deg;
            }

            to {
                --border-angle: 360deg;
            }
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            height: 48px;
        }

        .custom-heading {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .custom-heading h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: lowercase;
        }

        .custom-heading p {
            margin: 0;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .form-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .footer {
            position: absolute;
            bottom: 15px;
            text-align: center;
            color: var(--text-disabled);
            font-size: 12px;
        }

        .extension_tenantName_li,
        .extension_userRole_li,
        .extension_documentSources_li,
        .displayName_li,
        .extension_displayName_li {
            display: none;
        }

        .intro,
        .heading,
        .divider,
        .helpLink,
        .attrEntry .verificationSuccessText,
        .entry .working,
        .verifying-modal {
            display: none !important;
        }

        #attributeList ul,
        .entry,
        #localAccountForm .entry .entry-item {
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
            width: 100%;
        }

        .entry {
            gap: 48px;
        }

        #attributeList ul .attrEntry {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0;
            width: 100%;
        }

        #attributeList ul,
        #localAccountForm .entry .entry-item {
            gap: 16px;
        }

        #attributeList ul li,
        #localAccountForm .entry .entry-item {
            list-style: none;
            margin: 0;
        }

        #attributeList ul li label,
        .entry-item label {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
        }

        #attributeList ul li input,
        .entry-item input {
            width: 100%;
            height: 40px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            padding: 0 12px;
            color: var(--text-primary);
            font-size: 16px;
            background: #ffffff;
        }

        #attributeList li:has(#newPassword),
        #attributeList li:has(#reenterPassword) {
            display: none;
        }

        html.signup-password-step #attributeList li:has(#newPassword),
        html.signup-password-step #attributeList li:has(#reenterPassword) {
            display: flex;
        }

        .password-field {
            position: relative;
            width: 100%;
        }

        .password-field input {
            padding-right: 44px;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 8px;
            width: 24px;
            height: 24px;
            transform: translateY(-50%);
            border: none;
            border-radius: 4px;
            background: #ffffff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: pointer;
        }

        .password-toggle img {
            width: 16px;
            height: 16px;
        }

        #attributeList ul li input::placeholder,
        .entry-item input::placeholder {
            color: var(--text-disabled);
        }

        #localAccountForm .error,
        #api #attributeVerification .error {
            color: #b00;
            text-align: left;
            margin: 0;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            margin-top: 24px;
        }


        .buttons button {
            width: 100%;
            height: 48px;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .sendNewCode,
        .changeClaims {
            background: var(--navy);
            color: #ffffff;
            cursor: pointer;
        }

        #cancel {
            display: none;
        }

        .resend-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 100%;
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .resend-helper {
            color: var(--text-tertiary);
        }

        .resend-link {
            background: none;
            border: none;
            padding: 0;
            color: var(--navy);
            font-size: 12px;
            font-weight: 500;
            height: max-content !important;
            text-transform: lowercase !important;
            width: max-content !important;
            cursor: pointer;
        }

        /* Controlled visibility helpers */
        .b2c-hidden {
            display: none !important;
        }

        .signup-password-hidden {
            display: none !important;
        }

        .signup-verification-hidden {
            display: none !important;
        }

        /* Hide original verification input if you later replace it with OTP boxes */
        #emailVerificationCode.custom-hidden-verification-input {
            display: none !important;
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 24px;
            }
        }
    </style>

    <script defer>
        function customizeB2CUI() {
            const signUpButton = document.getElementById("continue");

            const emailInput = document.getElementById("email");
            const verificationCodeInput = document.getElementById("emailVerificationCode");
            const newPasswordInput = document.getElementById("newPassword");
            const confirmPasswordInput = document.getElementById("reenterPassword");

            const sendCodeButton = document.getElementById("emailVerificationControl_but_send_code");
            const verifyCodeButton = document.getElementById("emailVerificationControl_but_verify_code");
            const resendCodeButton = document.getElementById("emailVerificationControl_but_send_new_code");
            const changeClaimsButton = document.getElementById("emailVerificationControl_but_change_claims");

            const customLogo = document.getElementById("customLogo");

            if (customLogo) {
                customLogo.src = "https://stackeducation.github.io/custom_UI/v2/stack-logo.svg";
                customLogo.style.display = "block";
            }

            if (signUpButton) {
                signUpButton.textContent = "Create";
            }

            if (sendCodeButton) {
                sendCodeButton.textContent = "Send Verification Code";
            }

            if (verifyCodeButton) {
                verifyCodeButton.textContent = "Verify";
            }

            if (resendCodeButton) {
                resendCodeButton.textContent = "Resend code";
            }

            const getFieldRow = (input) => {
                if (!input) return null;

                return (
                    input.closest("li") ||
                    input.closest(".attrEntry") ||
                    input.closest(".entry-item") ||
                    input.parentElement
                );
            };

            const emailRow = getFieldRow(emailInput);
            const verificationRow = getFieldRow(verificationCodeInput);
            const newPasswordRow = getFieldRow(newPasswordInput);
            const confirmPasswordRow = getFieldRow(confirmPasswordInput);

            const showEl = (el, display = "") => {
                if (!el) return;
                el.classList.remove("b2c-hidden");
                el.classList.remove("signup-password-hidden");
                el.classList.remove("signup-verification-hidden");
                el.style.display = display;
            };

            const hideEl = (el) => {
                if (!el) return;
                el.classList.add("b2c-hidden");
                el.style.display = "none";
            };

            const isVisible = (el) => {
                return !!(
                    el &&
                    el.offsetParent !== null &&
                    getComputedStyle(el).display !== "none" &&
                    getComputedStyle(el).visibility !== "hidden"
                );
            };

            const applyPrimaryButtonState = (button, enabled) => {
                if (!button) return;

                button.disabled = !enabled;
                button.style.backgroundColor = enabled ? "#094074" : "#E1DFD9";
                button.style.color = enabled ? "#FFFFFF" : "#a3a3a3";
                button.style.cursor = enabled ? "pointer" : "not-allowed";
            };

            const attachPasswordToggle = (input) => {
                if (!input || input.dataset.toggleAttached) {
                    return;
                }

                const wrapper = document.createElement("div");
                wrapper.className = "password-field";

                const toggleButton = document.createElement("button");
                toggleButton.type = "button";
                toggleButton.className = "password-toggle";
                toggleButton.setAttribute("aria-label", "Show password");
                toggleButton.innerHTML =
                    "<img src='https://stackeducation.github.io/custom_UI/v2/eye-open-icon.svg' alt='' aria-hidden='true' />";

                input.parentNode.insertBefore(wrapper, input);
                wrapper.appendChild(input);
                wrapper.appendChild(toggleButton);

                toggleButton.addEventListener("click", () => {
                    const isHidden = input.type === "password";

                    input.type = isHidden ? "text" : "password";

                    toggleButton.setAttribute(
                        "aria-label",
                        isHidden ? "Hide password" : "Show password"
                    );

                    const icon = toggleButton.querySelector("img");

                    if (icon) {
                        icon.src = isHidden
                            ? "https://stackeducation.github.io/custom_UI/v2/eye-closed-icon.svg"
                            : "https://stackeducation.github.io/custom_UI/v2/eye-open-icon.svg";
                    }
                });

                input.dataset.toggleAttached = "true";
            };

            attachPasswordToggle(newPasswordInput);
            attachPasswordToggle(confirmPasswordInput);

            if (verifyCodeButton && resendCodeButton && !resendCodeButton.dataset.repositioned) {
                const resendRow = document.createElement("div");
                resendRow.className = "resend-row";

                const helperText = document.createElement("span");
                helperText.className = "resend-helper";
                helperText.textContent = "Didn't receive the code?";

                resendCodeButton.classList.add("resend-link");

                resendRow.appendChild(helperText);
                resendRow.appendChild(resendCodeButton);

                verifyCodeButton.parentNode.insertBefore(resendRow, verifyCodeButton);
                resendCodeButton.dataset.repositioned = "true";
            }

            const resendRow = resendCodeButton ? resendCodeButton.closest(".resend-row") : null;

            const getSignUpStep = () => {
                const hasEmail = emailInput && emailInput.value.trim() !== "";

                /*
                Password step:
                After successful verification, Azure B2C usually shows change claims
                or disables/hides verification controls.
                */
                const emailVerified =
                    isVisible(changeClaimsButton) ||
                    (
                        verificationCodeInput &&
                        verificationCodeInput.disabled &&
                        verificationCodeInput.value.trim() !== ""
                    ) ||
                    (
                        verifyCodeButton &&
                        verifyCodeButton.disabled &&
                        verificationCodeInput &&
                        verificationCodeInput.value.trim() !== ""
                    );

                if (emailVerified) {
                    return "password";
                }

                /*
                Verification step:
                Send code was clicked and B2C made verification controls visible.
                */
                const verificationStarted =
                    hasEmail &&
                    (
                        isVisible(verificationCodeInput) ||
                        isVisible(verifyCodeButton) ||
                        isVisible(resendCodeButton)
                    );

                if (verificationStarted) {
                    return "verification";
                }

                return "email";
            };

            const applyStepVisibility = () => {
                const step = getSignUpStep();

                const hasEmail = emailInput && emailInput.value.trim() !== "";
                const hasCode = verificationCodeInput && verificationCodeInput.value.trim() !== "";
                const hasPasswords =
                    newPasswordInput &&
                    confirmPasswordInput &&
                    newPasswordInput.value.trim() !== "" &&
                    confirmPasswordInput.value.trim() !== "";

                /*
                EMAIL STEP:
                Only email + send verification code.
                */
                if (step === "email") {
                    showEl(emailRow);

                    showEl(sendCodeButton);
                    applyPrimaryButtonState(sendCodeButton, hasEmail);

                    hideEl(verificationRow);
                    hideEl(verifyCodeButton);
                    hideEl(resendRow);
                    hideEl(resendCodeButton);
                    hideEl(changeClaimsButton);

                    hideEl(newPasswordRow);
                    hideEl(confirmPasswordRow);
                    hideEl(signUpButton);

                    return;
                }

                /*
                VERIFICATION STEP:
                Show code + resend + verify only.
                */
                if (step === "verification") {
                    showEl(emailRow);

                    hideEl(sendCodeButton);

                    showEl(verificationRow);
                    showEl(verifyCodeButton);
                    applyPrimaryButtonState(verifyCodeButton, hasCode);

                    showEl(resendRow, "flex");
                    showEl(resendCodeButton);

                    hideEl(changeClaimsButton);
                    hideEl(newPasswordRow);
                    hideEl(confirmPasswordRow);
                    hideEl(signUpButton);

                    return;
                }

                /*
                PASSWORD STEP:
                Show only password fields + Create.
                */
                if (step === "password") {
                    hideEl(emailRow);
                    hideEl(sendCodeButton);
                    hideEl(verificationRow);
                    hideEl(verifyCodeButton);
                    hideEl(resendRow);
                    hideEl(resendCodeButton);
                    hideEl(changeClaimsButton);

                    showEl(newPasswordRow);
                    showEl(confirmPasswordRow);

                    showEl(signUpButton);
                    applyPrimaryButtonState(signUpButton, hasPasswords);

                    return;
                }
            };

            const attachInputListener = (input) => {
                if (!input || input.dataset.stateListenerAttached) {
                    return;
                }

                input.addEventListener("input", applyStepVisibility);
                input.dataset.stateListenerAttached = "true";
            };

            attachInputListener(emailInput);
            attachInputListener(verificationCodeInput);
            attachInputListener(newPasswordInput);
            attachInputListener(confirmPasswordInput);

            const observedElements = [
                emailInput,
                verificationCodeInput,
                newPasswordInput,
                confirmPasswordInput,
                sendCodeButton,
                verifyCodeButton,
                resendCodeButton,
                changeClaimsButton,
                signUpButton
            ];

            observedElements.forEach((el) => {
                if (el && !el.dataset.visibilityObserverAttached) {
                    const observer = new MutationObserver(() => {
                        applyStepVisibility();
                    });

                    observer.observe(el, {
                        attributes: true,
                        attributeFilter: ["style", "class", "aria-hidden", "disabled"]
                    });

                    el.dataset.visibilityObserverAttached = "true";
                }
            });

            const apiContainer = document.getElementById("api");

            if (apiContainer && !apiContainer.dataset.visibilityObserverAttached) {
                const apiObserver = new MutationObserver(() => {
                    applyStepVisibility();
                });

                apiObserver.observe(apiContainer, {
                    childList: true,
                    subtree: true,
                    attributes: true,
                    attributeFilter: ["style", "class", "aria-hidden", "disabled"]
                });

                apiContainer.dataset.visibilityObserverAttached = "true";
            }

            applyStepVisibility();

            setTimeout(applyStepVisibility, 0);
            setTimeout(applyStepVisibility, 100);
            setTimeout(applyStepVisibility, 300);
            setTimeout(applyStepVisibility, 600);
        }

        document.addEventListener("DOMContentLoaded", customizeB2CUI);

        setTimeout(customizeB2CUI, 10);
        setTimeout(customizeB2CUI, 200);
        setTimeout(customizeB2CUI, 500);
    </script>
</head>

<body>
    <main class="page">
        <section class="card">
            <div class="brand">
                <div class="logo">
                    <img class="companyLogo"
                        src="https://stackeducation.github.io/custom_UI/v2/stack-logo.svg" width="179" height="48"
                        alt="Company Logo">
                </div>
                <div class="custom-heading">
                    <h1>create account</h1>
                    <p>Start researching with incline today</p>
                </div>
            </div>

            <div class="form-wrapper">
                <div id="api" data-name="SelfAsserted" role="main"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        © 2026 Stack AI, Inc.
    </footer>
</body>

</html>
