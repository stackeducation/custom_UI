<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="sign-in.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.5/dist/css/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <title>Sign In</title>
    <script src="signIn.js" defer></script>
</head>

<body>
    <main class="page">
        <section class="card">

            <div class="brand">
                <div class="logo">
                    <img class="companyLogo" data-tenant-branding-logo="true"
                        src="https://stackeducation.github.io/custom_UI/v2/stack-logo.svg" width="160" height="48px"
                        alt="Company Logo">
                </div>
            </div>

            <div class="custom-heading">
                <h1>Welcome back</h1>
                <p>Sign in to incline</p>
            </div>

            <div class="form-wrapper">
                <div id="api" data-name="Unified">
                    <!-- <div class="heading">
                        <h1 role="heading">Sign in</h1>
                    </div> -->
                    <form id="localAccountForm" class="localAccount" aria-label="Sign in with your email address">
                        <!-- <div class="intro">
                            <h2>
                                Sign in with your email address
                            </h2>
                        </div> -->
                        <div class="error pageLevel" aria-hidden="true" role="alert">
                            <p></p>
                        </div>
                        <div class="entry">
                            <div class="entry-item">
                                <label for="email">
                                    Email Address
                                </label>
                                <div class="error itemLevel" aria-hidden="true" role="alert" style="display: none;">
                                    <p>Please enter your Email Address</p>
                                </div>
                                <input type="email" id="email" name="Email Address"
                                    title="Please enter a valid email address"
                                    pattern="^[a-zA-Z0-9!#$%&amp;'+^_`{}~-]+(?:\.[a-zA-Z0-9!#$%&amp;'+^_`{}~-]+)*@(?:[a-zA-Z0-9](?:[a-zA-Z0-9-]*[a-zA-Z0-9])?\.)+[a-zA-Z0-9](?:[a-zA-Z0-9-]*[a-zA-Z0-9])?$"
                                    autofocus="" placeholder="Enter your email" aria-label="Email Address" class="">
                            </div>
                            <div class="entry-item">
                                <div class="password-label">
                                    <label for="password">Password</label>
                                    <a id="forgotPassword"
                                        href="/stackhealthtest.onmicrosoft.com/B2C_1_SignIn/api/CombinedSigninAndSignup/unified?claimsexchange=ForgotPassword&amp;csrf_token=UVp0dENaNnlBS0FCRzFDVU1PUDJmbFBremNYc00xZmZqY01KT0VUSUJQYnRJbDFNUU1XRENnai9wbXZvNnhaOWVtYlRyT20xV2hRTTV5Sm0xTDZpTXc9PTsyMDI2LTA1LTExVDA3OjE1OjQ3LjcyMTQ3OVo7c1ZpeVM1WEtzbnQzZlZqeElSdTVDdz09O3siT3JjaGVzdHJhdGlvblN0ZXAiOjF9&amp;tx=StateProperties=eyJUSUQiOiJjNzNjZmY5MS1lMjFkLTQ2MGEtODM0OS1kMGMzNjJkNmZkMWQifQ&amp;p=B2C_1_SignIn">Forgot
                                        Password?</a>
                                </div>
                                <div class="error itemLevel" aria-hidden="true" style="display: none;">
                                    <p role="alert">Please enter your password</p>
                                </div>
                                <input type="password" id="password" name="Password" placeholder="Enter Password"
                                    aria-label="Password" autocomplete="current-password" aria-required="true" class="">
                            </div>

                            <div class="working"></div>



                            <div class="buttons">
                                <button id="next" type="submit" form="localAccountForm">Sign in</button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

        </section>
    </main>

    <footer class="footer">
        © 2026 Stack AI, Inc.
    </footer>
</body>

</html>
