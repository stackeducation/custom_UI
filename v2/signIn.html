<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In</title>
    <style>
        :root {
            --page-bg: #f8f7f5;
            --card-bg: #ffffff;
            --card-border: #f5a631;
            --text-primary: #111111;
            --text-secondary: #3c372f;
            --text-tertiary: #6b6560;
            --text-disabled: #a3a3a3;
            --navy: #094074;
            --input-border: #c8c5be;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        html {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Inter", "DM Sans", "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.42857143;
            color: var(--text-primary);
            background: var(--page-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .page {
            display: flex;
            justify-content: center;
            padding: 100px 20px;
        }

        .card {
            width: 565px;
            max-width: 92vw;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            box-shadow: 0 0 20.5714px rgba(245, 166, 49, 0.12);
            padding: 56px;
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            height: 48px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
        }

        .logo-title {
            font-family: "DM Sans", "Inter", sans-serif;
            font-size: 27.81px;
            font-weight: 500;
            letter-spacing: -0.56px;
            color: #6e736f;
            line-height: 1;
            text-transform: lowercase;
        }

        .logo-subtitle {
            font-family: "DM Sans", "Inter", sans-serif;
            font-size: 12.64px;
            color: #6e736f;
            line-height: 1.1;
        }

        .custom-heading {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .custom-heading h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 500;
            color: #1f1f1f;
            text-transform: lowercase;
        }

        .custom-heading p {
            margin: 0;
            font-size: 12px;
            color: #7a7a7a;
        }

        .form-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .footer {
            position: absolute;
            bottom: 15px;
            text-align: center;
            color: var(--text-disabled);
            font-size: 12px;
        }

        .extension_tenantName_li,
        .extension_userRole_li,
        .extension_documentSources_li,
        .displayName_li,
        .extension_displayName_li {
            display: none;
        }

        .intro,
        .divider,
        .helpLink,
        .attrEntry .verificationSuccessText,
        .entry .entry-item .error,
        .entry .working,
        .verifying-modal {
            display: none !important;
        }

        #api {
            width: 100%;
        }

        #attributeList ul,
        .entry,
        #localAccountForm .entry .entry-item {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin: 0;
            padding: 0;
            width: 100%;
        }

        #attributeList ul li,
        #localAccountForm .entry .entry-item {
            list-style: none;
            margin: 0;
        }

        #attributeList ul li label,
        .entry-item label {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
        }

        #attributeList ul li input,
        .entry-item input {
            width: 100%;
            height: 40px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            padding: 0 12px;
            color: var(--text-primary);
            font-size: 16px;
        }

        #attributeList ul li input::placeholder,
        .entry-item input::placeholder {
            color: var(--text-disabled);
        }

        #localAccountForm .error,
        #api #attributeVerification .error {
            color: #b00;
            text-align: left;
            margin: 0;
        }

        #forgotPassword,
        .forgot-password a {
            color: var(--navy);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            display: inline-block;
            margin-top: 4px;
            text-align: right;
            width: 100%;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .buttons #cancel {
            display: none;
        }

        .buttons button:not([aria-disabled=true]) {
            opacity: 1;
        }

        .buttons button {
            width: 100%;
            height: 48px;
            background-color: var(--navy);
            border-radius: 6px;
            border: none;
            outline: none;
            color: #fff;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            text-transform: uppercase;
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 24px;
            }
        }
    </style>
    <script defer>
        setTimeout(() => {
            document.querySelector('.heading h1').textContent = "";
            const forgotPasswordLink = document.getElementById('forgotPassword');
            const signInButton = document.getElementById('next');
            if (forgotPasswordLink) {
                forgotPasswordLink.textContent = 'Forgot Password?'; 
            }
        }, 200);
        function customizeB2CUI() {

            // document.querySelector('.heading h1').textContent = "Login";
            const forgotPasswordLink = document.getElementById('forgotPassword');
            const signInButton = document.getElementById('next');
            if (forgotPasswordLink) {
                forgotPasswordLink.textContent = 'Forgot Password?'; 
            }

            const b2cHeading = document.querySelector(".heading");

            if (b2cHeading) {
                b2cHeading.style.display = "none";
            }

            const intro = document.querySelector(".intro");

            if (intro) {
                intro.style.display = "none";
            }

            const forgotPassword = document.getElementById("forgotPassword");

            if (forgotPassword) {
                forgotPassword.textContent = "Forgot password?";
            }

            const emailInput = document.getElementById("email");

            if (emailInput) {
                emailInput.placeholder = "Enter your email";
            }

            const passwordInput = document.getElementById("password");

            if (passwordInput) {
                passwordInput.placeholder = "Enter Password";
            }
        }

        document.addEventListener("DOMContentLoaded", () => {

            customizeB2CUI();

            const api = document.getElementById("api");

            if (!api) return;

            const observer = new MutationObserver(() => {
                customizeB2CUI();
            });

            observer.observe(api, {
                childList: true,
                subtree: true
            });
        });
    </script>
</head>

<body>
    <main class="page">
        <section class="card">

            <div class="brand">
                <div class="logo">
                    <img class="companyLogo" data-tenant-branding-logo="true"
                        src="https://stackeducation.github.io/custom_UI/v2/stack-logo.svg" width="160" height="48px"
                        alt="Company Logo">
                </div>
            </div>

            <div class="custom-heading">
                <h1>Welcome back</h1>
                <p>Sign in to incline</p>
            </div>

            <div class="form-wrapper">
                <div id="api">
                </div>
            </div>

        </section>
    </main>

    <footer class="footer">
        © 2026 Stack AI, Inc.
    </footer>
</body>

</html>
