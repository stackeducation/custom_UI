<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <title>Sign In</title>

    <style>
        :root {
            color-scheme: light dark;
            --page-bg: #F8F7F5;
            --card-bg: #ffffff;
            --card-border: #f5a631;
            --card-border-light: #FFD089;

            --text-primary: #111111;
            --text-secondary: #3c372f;
            --text-tertiary: #6b6560;
            --text-disabled: #a3a3a3;

            --navy: #094074;
            --primary-button-text: #ffffff;

            --input-bg: #ffffff;
            --input-border: #c8c5be;
            --input-focus-border: #094074;

            --button-disabled: #E1DFD9;
            --button-disabled-text: #a3a3a3;

            --error-text: #b00020;
            --shadow-color: rgba(245, 166, 49, 0.12);
            --autofill-bg: #ffffff;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                color-scheme: dark;

                --page-bg: #0F1115;
                --card-bg: #1F1F1F;
                --card-border: #f5a631;
                --card-border-light: #FFD089;

                --text-primary: #EDEDED;
                --text-secondary: #A3A3A3;
                --text-tertiary: #C7C7C7;
                --text-disabled: #8A8A8A;

                --navy: #5899D6;
                --primary-button-text: #07182A;

                --input-bg: #1F1F1F;
                --input-border: #333333;
                --input-focus-border: #5899D6;

                --button-disabled: #E1DFD9;
                --button-disabled-text: #a3a3a3;

                --error-text: #ff8a8a;
                --shadow-color: rgba(245, 166, 49, 0.16);
                --autofill-bg: #101318;
            }
        }

        html::-webkit-scrollbar {
            display: none;
        }

        html {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Inter", "DM Sans", "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.42857143;
            color: var(--text-primary);
            background: var(--page-bg) !important;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .page {
            display: flex;
            justify-content: center;
            padding: 100px 20px;
        }

        .card {
            position: relative;
            width: 565px;
            max-width: 92vw;
            padding: 56px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 32px;

            background:
                linear-gradient(var(--card-bg), var(--card-bg)) padding-box,
                conic-gradient(from var(--border-angle),
                    transparent 0deg,
                    transparent 220deg,
                    rgba(245, 166, 49, 0.12) 250deg,
                    rgba(255, 208, 137, 0.45) 270deg,
                    rgba(255, 244, 223, 0.45) 285deg,
                    var(--card-border-light) 300deg,
                    var(--card-border) 320deg,
                    var(--card-border) 340deg,
                    rgba(245, 166, 49, 0.25) 350deg,
                    transparent 360deg) border-box;

            border: 1.5px solid transparent;
            box-shadow: 0 0 20.5714px var(--shadow-color);
            animation: border-angle-rotate 5s linear infinite;
        }

        @property --border-angle {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes border-angle-rotate {
            from {
                --border-angle: 0deg;
            }

            to {
                --border-angle: 360deg;
            }
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            height: 48px;
        }
        
        .logo-icon {
            width: 32px;
            height: 32px;
        }

        .logo-title {
            font-family: "DM Sans", "Inter", sans-serif;
            font-size: 27.81px;
            font-weight: 500;
            letter-spacing: -0.56px;
            color: #6e736f;
            line-height: 1;
            text-transform: lowercase;
        }

        .logo-subtitle {
            font-family: "DM Sans", "Inter", sans-serif;
            font-size: 12.64px;
            color: #6e736f;
            line-height: 1.1;
        }

        .custom-heading {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .custom-heading h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: lowercase;
        }

        .custom-heading p {
            margin: 0;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .form-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .footer {
            position: absolute;
            bottom: 15px;
            text-align: center;
            color: var(--text-disabled);
            font-size: 12px;
        }

        .extension_tenantName_li,
        .extension_userRole_li,
        .extension_documentSources_li,
        .displayName_li,
        .extension_displayName_li {
            display: none;
        }

        .intro,
        .heading,
        .divider,
        .helpLink,
        .attrEntry .verificationSuccessText,
        .entry .entry-item .error,
        .entry .working,
        .verifying-modal {
            display: none !important;
        }

        .error.pageLevel {
            display: none;
        }

        #api {
            width: 100%;
        }

        #attributeList ul,
        .entry,
        #localAccountForm .entry .entry-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 0;
            padding: 0;
            width: 100%;
        }

        .entry {
            gap: 16px;
        }

        #attributeList ul li,
        #localAccountForm .entry .entry-item {
            list-style: none;
            margin: 0;
        }

        #attributeList ul li label,
        .entry-item label {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
            margin: 0;
        }

        #attributeList ul li input,
        .entry-item input {
            width: 100%;
            height: 40px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            padding: 0 12px;
            color: var(--text-primary);
            background: var(--input-bg);
            font-size: 16px;
            outline: none;
        }

        #attributeList ul li input:focus,
        .entry-item input:focus {
            border-color: var(--input-focus-border);
            box-shadow: 0 0 0 1px var(--input-focus-border);
        }

        #attributeList ul li input::placeholder,
        .entry-item input::placeholder {
            color: var(--text-disabled);
        }

        #attributeList ul li input:-webkit-autofill,
        #attributeList ul li input:-webkit-autofill:hover,
        #attributeList ul li input:-webkit-autofill:focus,
        #attributeList ul li input:-webkit-autofill:active,
        .entry-item input:-webkit-autofill,
        .entry-item input:-webkit-autofill:hover,
        .entry-item input:-webkit-autofill:focus,
        .entry-item input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px var(--autofill-bg) inset !important;
            box-shadow: 0 0 0 1000px var(--autofill-bg) inset !important;
            -webkit-text-fill-color: var(--text-primary) !important;
            caret-color: var(--text-primary) !important;
            font-size: 16px !important;
            transition: background-color 9999s ease-in-out 0s;
            border-radius: 4px;
        }

        .password-field {
            position: relative;
            width: 100%;
        }

        .password-field input {
            padding-right: 44px;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 8px;
            width: 24px;
            height: 24px;
            transform: translateY(-50%);
            border: none;
            border-radius: 4px;
            background: var(--input-bg);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: pointer;
        }

        .password-toggle img {
            width: 16px;
            height: 16px;
        }

        #localAccountForm .error,
        #api #attributeVerification .error {
            color: var(--error-text);
            text-align: left;
            margin: 0;
        }

        .password-label {
            display: flex;
            flex-direction: column;
        }

        #forgotPassword {
            align-self: flex-end;
            color: var(--navy);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            width: max-content;
        }

        #forgotPassword:hover {
            text-decoration: underline;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .buttons #cancel {
            display: none;
        }

        .buttons button:not([aria-disabled=true]) {
            opacity: 1;
        }

        .buttons button {
            width: 100%;
            height: 48px;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: 500;
            text-transform: uppercase;
        }

        #next:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 24px;
            }
        }
    </style>

    <script defer>
        function customizeB2CUI() {
            const getThemeColor = (name) =>
                getComputedStyle(document.documentElement)
                    .getPropertyValue(name)
                    .trim();

            const applyPrimaryButtonState = (button, enabled) => {
                if (!button) {
                    return;
                }

                button.disabled = !enabled;
                button.style.backgroundColor = enabled
                    ? getThemeColor("--navy")
                    : getThemeColor("--button-disabled");
                button.style.color = enabled
                    ? getThemeColor("--primary-button-text")
                    : getThemeColor("--button-disabled-text");
                button.style.cursor = enabled ? "pointer" : "not-allowed";
            };

            const forgotPasswordLink = document.getElementById("forgotPassword");
            const signInButton = document.getElementById("next");
            const emailInput = document.getElementById("email");
            const passwordInput = document.getElementById("password");

            if (forgotPasswordLink) {
                forgotPasswordLink.textContent = "Forgot Password?";
            }

            if (emailInput) {
                emailInput.placeholder = "Enter your email";
            }

            if (passwordInput) {
                passwordInput.placeholder = "Enter Password";
            }

            if (passwordInput && !passwordInput.dataset.toggleAttached) {
                const wrapper = document.createElement("div");
                wrapper.className = "password-field";

                const toggleButton = document.createElement("button");
                toggleButton.type = "button";
                toggleButton.className = "password-toggle";
                toggleButton.setAttribute("aria-label", "Show password");
                toggleButton.innerHTML =
                    "<img src='https://stackeducation.github.io/custom_UI/v2/eye-open-icon.svg' alt='' aria-hidden='true' />";

                passwordInput.parentNode.insertBefore(wrapper, passwordInput);
                wrapper.appendChild(passwordInput);
                wrapper.appendChild(toggleButton);

                toggleButton.addEventListener("click", () => {
                    const isHidden = passwordInput.type === "password";

                    passwordInput.type = isHidden ? "text" : "password";

                    toggleButton.setAttribute(
                        "aria-label",
                        isHidden ? "Hide password" : "Show password"
                    );

                    const icon = toggleButton.querySelector("img");

                    if (icon) {
                        icon.src = isHidden
                            ? "https://stackeducation.github.io/custom_UI/v2/eye-closed-icon.svg"
                            : "https://stackeducation.github.io/custom_UI/v2/eye-open-icon.svg";
                    }
                });

                passwordInput.dataset.toggleAttached = "true";
            }

            const updateButtonState = () => {
                if (!signInButton || !emailInput || !passwordInput) {
                    return;
                }

                const isReady = emailInput.value.trim() !== "" && passwordInput.value.trim() !== "";
                applyPrimaryButtonState(signInButton, isReady);
            };

            if (emailInput && !emailInput.dataset.stateListenerAttached) {
                emailInput.addEventListener("input", updateButtonState);
                emailInput.dataset.stateListenerAttached = "true";
            }

            if (passwordInput && !passwordInput.dataset.stateListenerAttached) {
                passwordInput.addEventListener("input", updateButtonState);
                passwordInput.dataset.stateListenerAttached = "true";
            }

            updateButtonState();

            const passwordEntryItem = document.querySelector(".entry .entry-item:nth-of-type(2)");
            if (passwordEntryItem && forgotPasswordLink) {
                if (forgotPasswordLink.parentElement !== passwordEntryItem) {
                    passwordEntryItem.appendChild(forgotPasswordLink);
                } else if (passwordEntryItem.lastElementChild !== forgotPasswordLink) {
                    passwordEntryItem.appendChild(forgotPasswordLink);
                }
            }

            const errorBox = document.querySelector(".error.pageLevel");

            if (errorBox) {
                const errorText = errorBox.querySelector("p");

                if (errorText?.textContent?.trim() !== "") {
                    errorBox.style.display = "block";
                    errorBox.setAttribute("aria-hidden", "false");
                } else {
                    errorBox.style.display = "none";
                    errorBox.setAttribute("aria-hidden", "true");
                }
            }

            if (!signInButton || signInButton.dataset.customAttached) {
                return;
            }

            signInButton.dataset.customAttached = "true";

            signInButton.addEventListener("click", (data) => {
                console.log("Custom logic before sign in", data);
            });
        }

        document.addEventListener("DOMContentLoaded", customizeB2CUI);

        setTimeout(customizeB2CUI, 10);
        setTimeout(customizeB2CUI, 200);

        window
            .matchMedia("(prefers-color-scheme: dark)")
            .addEventListener("change", () => {
                customizeB2CUI();
            });
    </script>
</head>

<body>
    <main class="page">
        <section class="card">

            <div class="brand">
                <div class="logo">
                    <img class="companyLogo" data-tenant-branding-logo="true"
                        src="https://stackeducation.github.io/custom_UI/v2/stack-logo.svg" width="160" height="48px"
                        alt="Company Logo">
                </div>
            </div>

            <div class="custom-heading">
                <h1>Welcome back</h1>
                <p>Sign in to incline</p>
            </div>

            <div class="form-wrapper">
                <div id="api"></div>
            </div>

        </section>
    </main>

    <footer class="footer">
        © 2026 Stack AI, Inc.
    </footer>
</body>
</html>
