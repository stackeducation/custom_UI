<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>Forgot Password</title>
    <style>
        :root {
            --page-bg: #F8F7F5;
            --card-bg: #ffffff;
            --card-border: #f5a631;
            --card-border-light: #FFD089;
            --angle: 0deg;
            --text-primary: #111111;
            --text-secondary: #3c372f;
            --text-tertiary: #6b6560;
            --text-disabled: #a3a3a3;
            --navy: #094074;
            --input-border: #c8c5be;
            --button-disabled: #e1dfd9;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        html {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Inter", "DM Sans", "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.42857143;
            color: var(--text-primary);
            background: var(--page-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .page {
            display: flex;
            justify-content: center;
            padding: 100px 20px;
        }

        .card {
            position: relative;

            width: 565px;
            max-width: 92vw;

            padding: 56px;

            border-radius: 16px;

            display: flex;
            flex-direction: column;
            gap: 32px;

            background:
                linear-gradient(var(--card-bg), var(--card-bg)) padding-box,

                conic-gradient(from var(--border-angle),

                    transparent 0deg,
                    transparent 220deg,

                    rgba(245, 166, 49, 0.12) 250deg,
                    rgba(255, 208, 137, 0.45) 270deg,
                    #fff4df 285deg,
                    var(--card-border-light) 300deg,
                    var(--card-border) 320deg,
                    var(--card-border) 340deg,

                    rgba(245, 166, 49, 0.25) 350deg,
                    transparent 360deg) border-box;

            border: 1.5px solid transparent;

            box-shadow:
                0 0 20.5714px rgba(245, 166, 49, 0.12);

            animation: border-angle-rotate 5s linear infinite;
        }

        /* Smooth animated CSS variable */
        @property --border-angle {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes border-angle-rotate {
            from {
                --border-angle: 0deg;
            }

            to {
                --border-angle: 360deg;
            }
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            height: 48px;
        }

        .custom-heading {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .custom-heading h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: lowercase;
        }

        .custom-heading p {
            margin: 0;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .form-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .footer {
            position: absolute;
            bottom: 15px;
            text-align: center;
            color: var(--text-disabled);
            font-size: 12px;
        }

        .extension_tenantName_li,
        .extension_userRole_li,
        .extension_documentSources_li,
        .displayName_li,
        .extension_displayName_li {
            display: none;
        }

        .intro,
        .heading,
        .divider,
        .helpLink,
        .attrEntry .verificationSuccessText,
        .entry .working,
        .verifying-modal {
            display: none !important;
        }

        #api {
            width: 100%;
        }

        #attributeList ul,
        .entry,
        #localAccountForm .entry .entry-item {
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
            width: 100%;
        }

        .entry {
            gap: 48px;
        }

        #attributeList ul,
        #localAccountForm .entry .entry-item {
            gap: 8px;
        }

        #attributeList ul li,
        #localAccountForm .entry .entry-item {
            list-style: none;
            margin: 0;
        }

        #attributeList ul li label,
        .entry-item label {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
        }

        #attributeList ul li input,
        .entry-item input {
            width: 100%;
            height: 40px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            padding: 0 12px;
            color: var(--text-primary);
            font-size: 16px;
            background: #ffffff;
        }

        #attributeList ul li input::placeholder,
        .entry-item input::placeholder {
            color: var(--text-disabled);
        }

        #localAccountForm .error,
        #api #attributeVerification .error {
            color: #b00;
            text-align: left;
            margin: 0;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
            margin-top: 10px;
        }

        .buttons button {
            width: 100%;
            height: 48px;
            background-color: var(--button-disabled);
            border-radius: 6px;
            border: none;
            outline: none;
            color: var(--text-disabled);
            font-size: 16px;
            font-weight: 500;
            cursor: not-allowed;
            text-transform: uppercase;
        }

        .buttons button:not([aria-disabled=true]):not([disabled]) {
            background-color: var(--navy);
            color: #ffffff;
            cursor: pointer;
        }

        .buttons #cancel {
            width: auto;
            height: auto;
            padding: 0;
            background: none;
            border: none;
            color: var(--navy);
            font-size: 16px;
            font-weight: 500;
            text-transform: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .buttons #cancel::before {
            content: "";
            width: 16px;
            height: 16px;
            display: inline-block;
            background: no-repeat center / contain url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='16'%20height='16'%20viewBox='0%200%2024%2024'%20fill='none'%3E%3Cpath%20d='M20%2012H5'%20stroke='%23094074'%20stroke-width='2'%20stroke-linecap='round'/%3E%3Cpath%20d='M12%2019L5%2012L12%205'%20stroke='%23094074'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E");
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 24px;
            }
        }
    </style>
    <script defer>
        setTimeout(() => {
            document.querySelector('.heading h1').textContent = "Forgot Password?";
        }, 100);
    </script>
</head>

<body>
    <main class="page">
        <section class="card">
            <div class="brand">
                <div class="logo">
                    <img class="companyLogo" data-tenant-branding-logo="true"
                        src="https://stackeducation.github.io/custom_UI/v2/stack-logo.svg" width="179" height="48"
                        alt="Company Logo">
                </div>
                <div class="custom-heading">
                    <h1>forgot your password?</h1>
                    <p>verify your email to reset the password</p>
                </div>
            </div>

            <div class="form-wrapper">
                <div id="api" data-name="SelfAsserted" role="main"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        © 2026 Stack AI, Inc.
    </footer>
</body>

</html>
