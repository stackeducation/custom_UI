<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up</title>
    <style>
        :root {
            --page-bg: #F8F7F5;
            --card-bg: #ffffff;
            --card-border: #f5a631;
            --card-border-light: #FFD089;
            --angle: 0deg;
            --text-primary: #111111;
            --text-secondary: #3c372f;
            --text-tertiary: #6b6560;
            --text-disabled: #a3a3a3;
            --navy: #094074;
            --input-border: #c8c5be;
            --button-disabled: #e1dfd9;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        html {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Inter", "DM Sans", "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.42857143;
            color: var(--text-primary);
            background: var(--page-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .page {
            display: flex;
            justify-content: center;
            padding: 100px 20px;
        }

        .card {
            position: relative;
            width: 565px;
            max-width: 92vw;
            padding: 56px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            background:
                linear-gradient(var(--card-bg), var(--card-bg)) padding-box,
                conic-gradient(from var(--border-angle),
                    transparent 0deg,
                    transparent 220deg,
                    rgba(245, 166, 49, 0.12) 250deg,
                    rgba(255, 208, 137, 0.45) 270deg,
                    #fff4df 285deg,
                    var(--card-border-light) 300deg,
                    var(--card-border) 320deg,
                    var(--card-border) 340deg,
                    rgba(245, 166, 49, 0.25) 350deg,
                    transparent 360deg) border-box;
            border: 1.5px solid transparent;
            box-shadow: 0 0 20.5714px rgba(245, 166, 49, 0.12);
            animation: border-angle-rotate 5s linear infinite;
        }

        @property --border-angle {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes border-angle-rotate {
            from {
                --border-angle: 0deg;
            }

            to {
                --border-angle: 360deg;
            }
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            height: 48px;
        }

        .custom-heading {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .custom-heading h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: lowercase;
        }

        .custom-heading p {
            margin: 0;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .form-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .footer {
            position: absolute;
            bottom: 15px;
            text-align: center;
            color: var(--text-disabled);
            font-size: 12px;
        }

        .extension_tenantName_li,
        .extension_userRole_li,
        .extension_documentSources_li,
        .displayName_li,
        .extension_displayName_li {
            display: none;
        }

        .intro,
        .heading,
        .divider,
        .helpLink,
        .attrEntry .verificationSuccessText,
        .entry .working,
        .verifying-modal,
        /* .buttons:last-child, */
        #api>.buttons {
            display: none !important;
        }

        #api {
            width: 100%;
        }


        #attributeList ul,
        .entry,
        #localAccountForm .entry .entry-item {
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
            width: 100%;
        }

        .entry {
            gap: 48px;
        }

        #attributeList ul .attrEntry {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0;
            width: 100%;
        }

        #attributeList ul,
        #localAccountForm .entry .entry-item {
            gap: 16px;
        }

        #attributeList ul li,
        #localAccountForm .entry .entry-item {
            list-style: none;
            margin: 0;
        }

        #attributeList ul li label,
        .entry-item label {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
        }

        #attributeList ul li input,
        .entry-item input {
            width: 100%;
            height: 40px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            padding: 0 12px;
            color: var(--text-primary);
            font-size: 16px;
            background: #ffffff;
        }

        .password-field {
            position: relative;
            width: 100%;
        }

        .password-field input {
            padding-right: 44px;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 8px;
            width: 24px;
            height: 24px;
            transform: translateY(-50%);
            border: none;
            border-radius: 4px;
            background: #ffffff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: pointer;
        }

        .password-toggle img {
            width: 16px;
            height: 16px;
        }

        #attributeList ul li input::placeholder,
        .entry-item input::placeholder {
            color: var(--text-disabled);
        }

        #localAccountForm .error,
        #api #attributeVerification .error {
            color: #b00;
            text-align: left;
            margin: 0;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            margin-top: 24px;
        }


        .buttons button {
            width: 100%;
            height: 48px;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .sendNewCode,
        .changeClaims {
            background: var(--navy);
            color: #ffffff;
            cursor: pointer;
        }

        #cancel {
            display: none;
        }

        .resend-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 100%;
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .resend-helper {
            color: var(--text-tertiary);
        }

        .resend-link {
            background: none;
            border: none;
            padding: 0;
            color: var(--navy);
            font-size: 12px;
            font-weight: 500;
            height: max-content !important;
            text-transform: lowercase !important;
            width: max-content !important;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 24px;
            }
        }
    </style>
    <script defer>
        function customizeB2CUI() {
            const signUpButton = document.getElementById('continue');
            if (signUpButton) {
                signUpButton.textContent = 'Sign Up';
            }


            const emailInput = document.getElementById("email");
            const verificationCodeInput = document.getElementById("emailVerificationCode");
            const newPasswordInput = document.getElementById("newPassword");
            const confirmPasswordInput = document.getElementById("reenterPassword");
            const sendCodeButton = document.getElementById("emailVerificationControl_but_send_code");
            const verifyCodeButton = document.getElementById("emailVerificationControl_but_verify_code");
            const resendCodeButton = document.getElementById("emailVerificationControl_but_send_new_code");

            if (verifyCodeButton) {
                verifyCodeButton.textContent = "Verify";
            }

            if (resendCodeButton) {
                resendCodeButton.textContent = "Resend code";
            }

            if (verifyCodeButton && resendCodeButton && !resendCodeButton.dataset.repositioned) {
                const resendRow = document.createElement("div");
                resendRow.className = "resend-row";

                const helperText = document.createElement("span");
                helperText.className = "resend-helper";
                helperText.textContent = "Didn't receive the code?";

                resendCodeButton.classList.add("resend-link");

                resendRow.appendChild(helperText);
                resendRow.appendChild(resendCodeButton);
                verifyCodeButton.parentNode.insertBefore(resendRow, verifyCodeButton);
                resendCodeButton.dataset.repositioned = "true";
            }

            const attachPasswordToggle = (input) => {
                if (!input || input.dataset.toggleAttached) {
                    return;
                }

                const wrapper = document.createElement("div");
                wrapper.className = "password-field";

                const toggleButton = document.createElement("button");
                toggleButton.type = "button";
                toggleButton.className = "password-toggle";
                toggleButton.setAttribute("aria-label", "Show password");
                toggleButton.innerHTML =
                    "<img src='https://stackeducation.github.io/custom_UI/v2/eye-open-icon.svg' alt='' aria-hidden='true' />";

                input.parentNode.insertBefore(wrapper, input);
                wrapper.appendChild(input);
                wrapper.appendChild(toggleButton);

                toggleButton.addEventListener("click", () => {
                    const isHidden = input.type === "password";
                    input.type = isHidden ? "text" : "password";
                    toggleButton.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
                    const icon = toggleButton.querySelector("img");
                    if (icon) {
                        icon.src = isHidden
                            ? "https://stackeducation.github.io/custom_UI/v2/eye-closed-icon.svg"
                            : "https://stackeducation.github.io/custom_UI/v2/eye-open-icon.svg";
                    }
                });

                input.dataset.toggleAttached = "true";
            };

            attachPasswordToggle(newPasswordInput);
            attachPasswordToggle(confirmPasswordInput);

            const setButtonState = (button, enabled) => {
                if (!button) {
                    return;
                }

                button.disabled = !enabled;
                button.style.backgroundColor = enabled ? "#094074" : "#E1DFD9";
                button.style.color = enabled ? "#FFFFFF" : "#a3a3a3";
                button.style.cursor = enabled ? "pointer" : "not-allowed";

                const resendRow = button.closest(".resend-row");
                if (resendRow) {
                    resendRow.style.display = getComputedStyle(button).display === "none" ? "none" : "flex";
                }
            };

            const updateResendRowVisibility = () => {
                if (!resendCodeButton) {
                    return;
                }

                const resendRow = resendCodeButton.closest(".resend-row");
                if (resendRow) {
                    resendRow.style.display = getComputedStyle(resendCodeButton).display === "none" ? "none" : "flex";
                }
            };

            const updateButtonState = () => {
                if (!emailInput) {
                    return;
                }
                const hasEmail = emailInput.value.trim() !== "";
                const hasCode = verificationCodeInput && verificationCodeInput.value.trim() !== "";
                const hasPasswords = newPasswordInput && confirmPasswordInput
                    ? newPasswordInput.value.trim() !== "" && confirmPasswordInput.value.trim() !== ""
                    : false;
                setButtonState(sendCodeButton, hasEmail);
                setButtonState(verifyCodeButton, hasCode);
                setButtonState(signUpButton, hasPasswords);
                updateResendRowVisibility();
            };

            const attachInputListener = (input) => {
                if (!input || input.dataset.stateListenerAttached) {
                    return;
                }

                input.addEventListener("input", updateButtonState);
                input.dataset.stateListenerAttached = "true";
            };

            attachInputListener(emailInput);
            attachInputListener(verificationCodeInput);
            attachInputListener(newPasswordInput);
            attachInputListener(confirmPasswordInput);
            updateButtonState();
        }

        setTimeout(customizeB2CUI, 10);
        // Backup retry
        setTimeout(customizeB2CUI, 200);
    </script>
</head>

<body>
    <main class="page">
        <section class="card">
            <div class="brand">
                <div class="logo">
                    <img class="companyLogo" data-tenant-branding-logo="true"
                        src="https://stackeducation.github.io/custom_UI/v2/stack-logo.svg" width="179" height="48"
                        alt="Company Logo">
                </div>
                <div class="custom-heading">
                    <h1>create account</h1>
                    <p>Start researching with incline today</p>
                </div>
            </div>

            <div class="form-wrapper">
                <div id="api" data-name="SelfAsserted" role="main"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        © 2026 Stack AI, Inc.
    </footer>
</body>

</html>
