<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sign In</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@3.3.5/dist/css/bootstrap.min.css"
        rel="stylesheet"
        type="text/css" />

    <style>
        :root {
            --page-bg: #F8F7F5;
            --card-bg: #ffffff;
            --card-border: #f5a631;
            --card-border-light: #FFD089;
            --angle: 0deg;
            --text-primary: #111111;
            --text-secondary: #3c372f;
            --text-tertiary: #6b6560;
            --text-disabled: #a3a3a3;
            --navy: #094074;
            --input-border: #c8c5be;
            --border-default: #E1DFD9;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        html {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Inter", "DM Sans", "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.42857143;
            color: var(--text-primary);
            background: var(--page-bg) !important;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .page {
            display: flex;
            justify-content: center;
            padding: 100px 20px;
        }

        .card {
            position: relative;
            width: 565px;
            max-width: 92vw;
            padding: 56px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 32px;

            background:
                linear-gradient(var(--card-bg), var(--card-bg)) padding-box,
                conic-gradient(from var(--border-angle),
                    transparent 0deg,
                    transparent 220deg,
                    rgba(245, 166, 49, 0.12) 250deg,
                    rgba(255, 208, 137, 0.45) 270deg,
                    #fff4df 285deg,
                    var(--card-border-light) 300deg,
                    var(--card-border) 320deg,
                    var(--card-border) 340deg,
                    rgba(245, 166, 49, 0.25) 350deg,
                    transparent 360deg) border-box;

            border: 1.5px solid transparent;

            box-shadow:
                0 0 20.5714px rgba(245, 166, 49, 0.12);

            animation: border-angle-rotate 5s linear infinite;
        }

        @property --border-angle {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes border-angle-rotate {
            from {
                --border-angle: 0deg;
            }

            to {
                --border-angle: 360deg;
            }
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            height: 48px;
        }

        .custom-heading {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .custom-heading h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 500;
            color: #1f1f1f;
            text-transform: lowercase;
        }

        .custom-heading p {
            margin: 0;
            font-size: 12px;
            color: #7a7a7a;
        }

        .form-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .footer {
            position: absolute;
            bottom: 15px;
            text-align: center;
            color: var(--text-disabled);
            font-size: 12px;
        }

        .extension_tenantName_li,
        .extension_userRole_li,
        .extension_documentSources_li,
        .displayName_li,
        .error.pageLevel,
        .extension_displayName_li {
            display: none;
        }

        .intro,
        .heading,
        .divider,
        .helpLink,
        .attrEntry .verificationSuccessText,
        .entry .entry-item .error,
        .entry .working,
        .verifying-modal {
            display: none !important;
        }

        #api {
            width: 100%;
        }

        #attributeList ul,
        .entry,
        #localAccountForm .entry .entry-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 0;
            padding: 0;
            width: 100%;
        }

        .entry {
            gap: 16px;
        }

        #attributeList ul li,
        #localAccountForm .entry .entry-item {
            list-style: none;
            margin: 0;
        }

        #attributeList ul li label,
        .entry-item label {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
            margin: 0;
        }

        #attributeList ul li input,
        .entry-item input {
            width: 100%;
            height: 40px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            padding: 0 12px;
            color: var(--text-primary);
            font-size: 16px;
        }

        .password-field {
            position: relative;
            width: 100%;
        }

        .password-field input {
            padding-right: 44px;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 8px;
            width: 24px;
            height: 24px;
            transform: translateY(-50%);
            border: none;
            border-radius: 4px;
            background: #ffffff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: pointer;
        }

        #attributeList ul li input::placeholder,
        .entry-item input::placeholder {
            color: var(--text-disabled);
        }

        #forgotPassword {
            align-self: flex-end;
            color: var(--navy);
            font-size: 14px;
            font-weight: 500;
            text-decoration: none;
            width: max-content;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .buttons #cancel {
            display: none;
        }

        .buttons button {
            width: 100%;
            height: 48px;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: 500;
            text-transform: uppercase;
        }

        #next:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 24px;
            }
        }
    </style>
</head>

<body>

    <main class="page">

        <section class="card">

            <div class="brand">
                <div class="logo">
                    <img class="companyLogo"
                        data-tenant-branding-logo="true"
                        src="https://stackeducation.github.io/custom_UI/v2/stack-logo.svg"
                        width="160"
                        height="48"
                        alt="Company Logo">
                </div>
            </div>

            <div class="custom-heading">
                <h1>Welcome back</h1>
                <p>Sign in to incline</p>
            </div>

            <div class="form-wrapper">
                <div id="api"></div>
            </div>

        </section>
    </main>

    <footer class="footer">
        © 2026 Stack AI, Inc.
    </footer>

    <script>
        function customizeB2CUI() {

            const forgotPasswordLink = document.getElementById('forgotPassword');
            const signInButton = document.getElementById('next');
            const emailInput = document.getElementById("email");
            const passwordInput = document.getElementById("password");

            if (forgotPasswordLink) {
                forgotPasswordLink.textContent = 'Forgot Password?';
            }

            if (emailInput) {
                emailInput.placeholder = "Enter your email";
            }

            if (passwordInput) {
                passwordInput.placeholder = "Enter Password";
            }

            if (passwordInput && !passwordInput.dataset.toggleAttached) {

                const wrapper = document.createElement("div");
                wrapper.className = "password-field";

                const toggleButton = document.createElement("button");

                toggleButton.type = "button";
                toggleButton.className = "password-toggle";

                toggleButton.setAttribute("aria-label", "Show password");

                toggleButton.innerHTML =
                    "<img src='https://stackeducation.github.io/custom_UI/v2/eye-open-icon.svg' alt='' aria-hidden='true' />";

                passwordInput.parentNode.insertBefore(wrapper, passwordInput);

                wrapper.appendChild(passwordInput);
                wrapper.appendChild(toggleButton);

                toggleButton.addEventListener("click", () => {

                    const isHidden = passwordInput.type === "password";

                    passwordInput.type = isHidden ? "text" : "password";

                    toggleButton.setAttribute(
                        "aria-label",
                        isHidden ? "Hide password" : "Show password"
                    );

                    const icon = toggleButton.querySelector("img");

                    if (icon) {
                        icon.src = isHidden
                            ? "https://stackeducation.github.io/custom_UI/v2/eye-closed-icon.svg"
                            : "https://stackeducation.github.io/custom_UI/v2/eye-open-icon.svg";
                    }
                });

                passwordInput.dataset.toggleAttached = "true";
            }

            const updateButtonState = () => {

                if (!signInButton || !emailInput || !passwordInput) {
                    return;
                }

                const isReady =
                    emailInput.value.trim() !== "" &&
                    passwordInput.value.trim() !== "";

                if (isReady) {
                    signInButton.disabled = false;
                    signInButton.style.backgroundColor = "#094074";
                    signInButton.style.color = "#FFFFFF";
                    signInButton.style.cursor = "pointer";
                }
                else {
                    signInButton.disabled = true;
                    signInButton.style.backgroundColor = "#E1DFD9";
                    signInButton.style.color = "#a3a3a3";
                    signInButton.style.cursor = "not-allowed";
                }
            };

            if (emailInput && passwordInput) {

                if (!emailInput.dataset.stateListenerAttached) {
                    emailInput.addEventListener("input", updateButtonState);
                    emailInput.dataset.stateListenerAttached = "true";
                }

                if (!passwordInput.dataset.stateListenerAttached) {
                    passwordInput.addEventListener("input", updateButtonState);
                    passwordInput.dataset.stateListenerAttached = "true";
                }
            }

            updateButtonState();

            const passwordEntryItem =
                document.querySelector(".entry .entry-item:nth-of-type(2)");

            if (passwordEntryItem && forgotPasswordLink) {

                if (forgotPasswordLink.parentElement !== passwordEntryItem) {
                    passwordEntryItem.appendChild(forgotPasswordLink);
                }
                else if (
                    passwordEntryItem.lastElementChild !== forgotPasswordLink
                ) {
                    passwordEntryItem.appendChild(forgotPasswordLink);
                }
            }

            const errorBox = document.querySelector(".error.pageLevel");

            if (errorBox) {

                const errorText = errorBox.querySelector("p");

                if (errorText?.textContent?.trim() !== "") {
                    errorBox.style.display = "block";
                    errorBox.setAttribute("aria-hidden", "false");
                }
                else {
                    errorBox.style.display = "none";
                    errorBox.setAttribute("aria-hidden", "true");
                }
            }

            if (!signInButton || signInButton.dataset.customAttached) {
                return;
            }

            signInButton.dataset.customAttached = "true";

            signInButton.addEventListener("click", (data) => {
                console.log("Custom logic before sign in", data);
            });
        }

        const observer = new MutationObserver(() => {
            customizeB2CUI();
        });

        observer.observe(document.body, {
            childList: true,
            subtree: true
        });

        setTimeout(customizeB2CUI, 10);
        setTimeout(customizeB2CUI, 200);
        setTimeout(customizeB2CUI, 500);
    </script>

</body>
</html>
