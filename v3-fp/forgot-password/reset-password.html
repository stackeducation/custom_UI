<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link rel="stylesheet" href="forgotPassword.css">
</head>

<body>
    <main class="page">
        <section class="card">
            <div class="brand">
                <div class="logo">
                    <img class="companyLogo" 
                        src="../stack-logo.svg" width="179" height="48"
                        alt="Company Logo">
                    <span class="brand-text">incline by STACK education</span>
                </div>
                <div class="custom-heading">
                    <h1>reset password</h1>
                    <p>enter your new password</p>
                </div>
            </div>

            <div class="form-wrapper">
                <form id="resetPasswordForm">
                    <div class="entry-item">
                        <label for="newPassword">New Password</label>
                        <input type="password" id="newPassword" placeholder="Enter new password" required>
                        <div class="password-requirements">
                            <p>Password must contain:</p>
                            <ul>
                                <li id="length">At least 8 characters</li>
                                <li id="uppercase">One uppercase letter</li>
                                <li id="lowercase">One lowercase letter</li>
                                <li id="number">One number</li>
                            </ul>
                        </div>
                    </div>

                    <div class="entry-item">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                    </div>

                    <div class="buttons">
                        <button type="submit" id="resetButton" disabled>
                            RESET PASSWORD
                        </button>
                        <button type="button" id="cancelButton" class="cancel">
                            Back to Sign in
                        </button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <footer class="footer">
        © 2026 Stack AI, Inc.
    </footer>

    <script src="forgotPassword.js"></script>
    <script>
        // Initialize reset password page
        document.addEventListener('DOMContentLoaded', function() {
            initializeResetPasswordPage();
        });
    </script>
</body>

</html>
