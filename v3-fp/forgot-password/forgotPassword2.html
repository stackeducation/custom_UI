<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link rel="stylesheet" href="forgotPassword.css"/>
</head>

<body>
    <main class="page">
        <section class="card">
            <div class="brand">
                <div class="logo">
                    <img class="companyLogo" 
                        src="https://stackeducation.github.io/custom_UI/v2/stack-logo.svg" width="179" height="48"
                        alt="Company Logo">
                    <span class="brand-text">incline by STACK education</span>
                </div>
                <div class="custom-heading">
                    <h1 id="page-heading">forgot your password?</h1>
                    <p id="page-description">verify your email to reset the password</p>
                </div>
            </div>

            <div class="form-wrapper">
                <!-- Email Step -->
                <div id="email-step" class="step active">
                    <div id="api" data-name="SelfAsserted" role="main"></div>
                </div>

                <!-- Verification Step -->
                <div id="verify-step" class="step">
                    <form id="verificationForm">
                                                
                        <div class="verification-inputs">
                            <input type="text" maxlength="1" class="code-input" id="code1" required>
                            <input type="text" maxlength="1" class="code-input" id="code2" required>
                            <input type="text" maxlength="1" class="code-input" id="code3" required>
                            <input type="text" maxlength="1" class="code-input" id="code4" required>
                            <input type="text" maxlength="1" class="code-input" id="code5" required>
                            <input type="text" maxlength="1" class="code-input" id="code6" required>
                        </div>
                        
                        <div class="resend-container">
                            <a href="#" id="resendLink" class="resend-link">resend code</a>
                        </div>

                        <div class="buttons">
                            <button type="submit" id="verifyButton" disabled>
                                VERIFY
                            </button>
                            <button type="button" id="cancelButton" class="cancel">
                                Back to Sign in
                            </button>
                        </div>
                    </form>
                </div>

                <!-- Reset Password Step -->
                <div id="reset-step" class="step">
                    <form id="resetPasswordForm">
                        <div class="entry-item">
                            <label for="newPassword">New Password</label>
                            <input type="password" id="newPassword" placeholder="Enter new password" required>
                            <div class="password-requirements">
                                <p>Password must contain:</p>
                                <ul>
                                    <li id="length">At least 8 characters</li>
                                    <li id="uppercase">One uppercase letter</li>
                                    <li id="lowercase">One lowercase letter</li>
                                    <li id="number">One number</li>
                                </ul>
                            </div>
                        </div>

                        <div class="entry-item">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
                        </div>

                        <div class="buttons">
                            <button type="submit" id="resetButton" disabled>
                                RESET PASSWORD
                            </button>
                            <button type="button" id="cancelButton" class="cancel">
                                Back to Sign in
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        © 2026 Stack AI, Inc.
    </footer>

    <script src="forgotPassword.js" defer></script>
</body>

</html>
