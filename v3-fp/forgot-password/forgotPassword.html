<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://stackeducation.github.io/custom_UI/v2/forgot-password/forgot-password.css"/>
    <title>Forgot Password</title>
    <script defer src="https://stackeducation.github.io/custom_UI/v2/forgot-password/forgot-password.js"></script>
</head>

<body>
    <main class="page">
        <section class="card">
            <div class="brand">
                <div class="logo">
                    <img class="companyLogo" data-tenant-branding-logo="true"
                        src="https://stackeducation.github.io/custom_UI/v2/stack-logo.svg" width="179" height="48"
                        alt="Company Logo">
                </div>
                <div class="custom-heading">
                    <h1>forgot your password?</h1>
                    <p>verify your email to reset the password</p>
                </div>
            </div>

            <div class="form-wrapper">
                <div id="api" data-name="SelfAsserted" role="main"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        © 2026 Stack AI, Inc.
    </footer>
</body>

</html>
                    </div>
                </div>

                <!-- Page 2: Verification Code -->
                <div id="page2" class="form-page hidden">
                    <div class="entry">
                        <div class="entry-item">
                            <label>Verify email</label>
                            <p class="verify-description">Verification Code sent to <span id="emailDisplay"></span>
                                <a href="#" id="editEmailLink" class="edit-link">Edit</a>
                            </p>
                        </div>
                        <div class="entry-item">
                            <label for="codeInput">Enter 6-digit code</label>
                            <input 
                                type="text" 
                                id="codeInput" 
                                placeholder="Enter verification code"
                                maxlength="6"
                                inputmode="numeric"
                            />
                        </div>
                        <div class="resend-row">
                            <span class="resend-helper">Didn't receive the code?</span>
                            <button type="button" id="resendCodeBtn" class="resend-link">
                                resend code
                            </button>
                        </div>
                    </div>
                    <div class="buttons">
                        <button type="button" id="verifyCodeBtn" class="primary-button">
                            VERIFY
                        </button>
                        <button type="button" id="cancelBtn2" class="cancel-button">
                            Back to Sign in
                        </button>
                    </div>
                </div>

                <!-- Page 3: Password Reset -->
                <div id="page3" class="form-page hidden">
                    <div class="entry">
                        <div class="entry-item">
                            <label for="newPasswordInput">New Password</label>
                            <div class="password-field">
                                <input 
                                    type="password" 
                                    id="newPasswordInput" 
                                    placeholder="Enter New Password"
                                />
                                <button type="button" class="password-toggle" data-target="newPasswordInput" aria-label="Show password">
                                    <img src='https://stackeducation.github.io/custom_UI/v2/eye-open-icon.svg' alt='' aria-hidden='true' />
                                </button>
                            </div>
                        </div>
                        <div class="entry-item">
                            <label for="confirmPasswordInput">Confirm Password</label>
                            <div class="password-field">
                                <input 
                                    type="password" 
                                    id="confirmPasswordInput" 
                                    placeholder="Confirm Password"
                                />
                                <button type="button" class="password-toggle" data-target="confirmPasswordInput" aria-label="Show password">
                                    <img src='https://stackeducation.github.io/custom_UI/v2/eye-open-icon.svg' alt='' aria-hidden='true' />
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="buttons">
                        <button type="button" id="resetPasswordBtn" class="primary-button">
                            RESET PASSWORD
                        </button>
                        <button type="button" id="cancelBtn3" class="cancel-button">
                            Back to Sign in
                        </button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        © 2026 Stack AI, Inc.
    </footer>
</body>

</html>
