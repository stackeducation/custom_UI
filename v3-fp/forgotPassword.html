<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Forgot Password</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            --page-bg: #F8F7F5;
            --card-bg: #ffffff;
            --card-border: #f5a631;
            --card-border-light: #FFD089;
            --angle: 0deg;
            --text-primary: #111111;
            --text-secondary: #3c372f;
            --text-tertiary: #6b6560;
            --text-disabled: #a3a3a3;
            --navy: #094074;
            --input-border: #c8c5be;
            --button-disabled: #e1dfd9;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        html {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Inter", "DM Sans", "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.42857143;
            color: var(--text-primary);
            background: var(--page-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .page {
            display: flex;
            justify-content: center;
            padding: 100px 20px;
        }

        .card {
            position: relative;
            width: 565px;
            max-width: 92vw;
            padding: 56px;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            gap: 32px;

            background:
                linear-gradient(var(--card-bg), var(--card-bg)) padding-box,
                conic-gradient(from var(--border-angle),
                    transparent 0deg,
                    transparent 220deg,
                    rgba(245, 166, 49, 0.12) 250deg,
                    rgba(255, 208, 137, 0.45) 270deg,
                    #fff4df 285deg,
                    var(--card-border-light) 300deg,
                    var(--card-border) 320deg,
                    var(--card-border) 340deg,
                    rgba(245, 166, 49, 0.25) 350deg,
                    transparent 360deg) border-box;

            border: 1.5px solid transparent;

            box-shadow:
                0 0 20.5714px rgba(245, 166, 49, 0.12);

            animation: border-angle-rotate 5s linear infinite;
        }

        @property --border-angle {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes border-angle-rotate {
            from {
                --border-angle: 0deg;
            }

            to {
                --border-angle: 360deg;
            }
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            height: 48px;
        }

        .custom-heading {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .custom-heading h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: lowercase;
        }

        .custom-heading p {
            margin: 0;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .form-wrapper {
            width: 100%;
        }

        .footer {
            position: absolute;
            bottom: 15px;
            text-align: center;
            color: var(--text-disabled);
            font-size: 12px;
        }

        .extension_tenantName_li,
        .extension_userRole_li,
        .extension_documentSources_li,
        .displayName_li,
        .extension_displayName_li {
            display: none;
        }

        .intro,
        .heading,
        .divider,
        .helpLink,
        .attrEntry .verificationSuccessText,
        .entry .working,
        .buttons:first-child,
        .verifying-modal,
        .page-2-hidden,
        .page-3-hidden {
            display: none !important;
        }

        #api {
            width: 100%;
        }

        #attributeList ul,
        .entry,
        #localAccountForm .entry .entry-item {
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
            width: 100%;
            gap: 8px;
        }

        .entry {
            gap: 48px;
        }

        #attributeList ul .attrEntry {
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 0;
            width: 100%;
        }

        #attributeList ul li,
        #localAccountForm .entry .entry-item {
            list-style: none;
        }

        #attributeList ul li label,
        .entry-item label {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
        }

        #attributeList ul li input,
        .entry-item input {
            width: 100%;
            height: 40px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            padding: 0 12px;
            color: var(--text-primary);
            font-size: 16px;
            background: #ffffff;
        }

        .password-field {
            position: relative;
            width: 100%;
        }

        .password-field input {
            padding-right: 44px;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 8px;
            width: 24px;
            height: 24px;
            transform: translateY(-50%);
            border: none;
            border-radius: 4px;
            background: #ffffff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: pointer;
        }

        .password-toggle img {
            width: 16px;
            height: 16px;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .buttons button {
            width: 100%;
            height: 48px;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .changeClaims {
            background: var(--navy);
            color: #ffffff;
            cursor: pointer;
        }

        .buttons #cancel {
            width: auto;
            height: auto;
            padding: 0;
            background: none;
            border: none;
            color: var(--navy);
            font-size: 16px;
            font-weight: 500;
            text-transform: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .resend-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 100%;
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .resend-link {
            background: none;
            border: none;
            padding: 0;
            color: var(--navy);
            font-size: 12px;
            font-weight: 500;
            height: max-content !important;
            text-transform: lowercase !important;
            width: max-content !important;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .card {
                padding: 40px 24px;
            }
        }
    </style>
      <script>
        let currentPage = 1;

        function customizeB2CUI() {

            const emailInput = document.getElementById("email");
            const verificationCodeInput = document.getElementById("emailVerificationCode");
            const newPasswordInput = document.getElementById("newPassword");
            const confirmPasswordInput = document.getElementById("reenterPassword");

            const sendCodeButton =
                document.getElementById("emailVerificationControl_but_send_code");

            const verifyCodeButton =
                document.getElementById("emailVerificationControl_but_verify_code");

            const resendCodeButton =
                document.getElementById("emailVerificationControl_but_send_new_code");

            const continueButton =
                document.getElementById("continue");

            const changeClaimsButton =
                document.getElementById("emailVerificationControl_but_change_claims");

            if (verifyCodeButton) {
                verifyCodeButton.textContent = "Verify";
            }

            if (resendCodeButton) {
                resendCodeButton.textContent = "Resend code";
            }

            if (
                verifyCodeButton &&
                resendCodeButton &&
                !resendCodeButton.dataset.repositioned
            ) {

                const resendRow = document.createElement("div");
                resendRow.className = "resend-row page-2-hidden";

                const helperText = document.createElement("span");
                helperText.textContent = "Didn't receive the code?";

                resendCodeButton.classList.add("resend-link");

                resendRow.appendChild(helperText);
                resendRow.appendChild(resendCodeButton);

                verifyCodeButton.parentNode.insertBefore(
                    resendRow,
                    verifyCodeButton
                );

                resendCodeButton.dataset.repositioned = "true";
            }

            const attachPasswordToggle = (input) => {

                if (!input || input.dataset.toggleAttached) {
                    return;
                }

                const wrapper = document.createElement("div");
                wrapper.className = "password-field";

                const toggleButton = document.createElement("button");

                toggleButton.type = "button";
                toggleButton.className = "password-toggle";

                toggleButton.setAttribute("aria-label", "Show password");

                toggleButton.innerHTML =
                    "<img src='https://stackeducation.github.io/custom_UI/v3-fp/eye-open-icon.svg' alt='' aria-hidden='true' />";

                input.parentNode.insertBefore(wrapper, input);

                wrapper.appendChild(input);
                wrapper.appendChild(toggleButton);

                toggleButton.addEventListener("click", () => {

                    const isHidden = input.type === "password";

                    input.type = isHidden ? "text" : "password";

                    const icon = toggleButton.querySelector("img");

                    if (icon) {
                        icon.src = isHidden
                            ? "https://stackeducation.github.io/custom_UI/v3-fp/eye-closed-icon.svg"
                            : "https://stackeducation.github.io/custom_UI/v3-fp/eye-open-icon.svg";
                    }
                });

                input.dataset.toggleAttached = "true";
            };

            attachPasswordToggle(newPasswordInput);
            attachPasswordToggle(confirmPasswordInput);

            const setPage = (page) => {
                currentPage = page;

                const emailEntry = emailInput?.closest(".attrEntry");
                const codeEntry = verificationCodeInput?.closest(".attrEntry");
                const passwordEntry = newPasswordInput?.closest(".attrEntry");
                const confirmEntry = confirmPasswordInput?.closest(".attrEntry");

                if (page === 1) {
                    if (emailEntry) emailEntry.classList.remove("page-2-hidden", "page-3-hidden");
                    if (codeEntry) codeEntry.classList.add("page-2-hidden");
                    if (passwordEntry) passwordEntry?.classList.add("page-3-hidden");
                    if (confirmEntry) confirmEntry?.classList.add("page-3-hidden");
                    if (sendCodeButton) sendCodeButton.classList.remove("page-2-hidden");
                    if (verifyCodeButton) verifyCodeButton.classList.add("page-2-hidden");
                    if (resendCodeButton) resendCodeButton.classList.add("page-2-hidden");
                    if (continueButton) continueButton.classList.add("page-3-hidden");
                    document.querySelectorAll(".resend-row").forEach(row => row.classList.add("page-2-hidden"));
                } else if (page === 2) {
                    if (emailEntry) emailEntry.classList.add("page-2-hidden");
                    if (codeEntry) codeEntry.classList.remove("page-2-hidden");
                    if (passwordEntry) passwordEntry?.classList.add("page-3-hidden");
                    if (confirmEntry) confirmEntry?.classList.add("page-3-hidden");
                    if (sendCodeButton) sendCodeButton.classList.add("page-2-hidden");
                    if (verifyCodeButton) verifyCodeButton.classList.remove("page-2-hidden");
                    if (resendCodeButton) resendCodeButton.classList.remove("page-2-hidden");
                    if (continueButton) continueButton.classList.add("page-3-hidden");
                    document.querySelectorAll(".resend-row").forEach(row => row.classList.remove("page-2-hidden"));
                } else if (page === 3) {
                    if (emailEntry) emailEntry.classList.add("page-2-hidden");
                    if (codeEntry) codeEntry.classList.add("page-2-hidden");
                    if (passwordEntry) passwordEntry?.classList.remove("page-3-hidden");
                    if (confirmEntry) confirmEntry?.classList.remove("page-3-hidden");
                    if (sendCodeButton) sendCodeButton.classList.add("page-2-hidden");
                    if (verifyCodeButton) verifyCodeButton.classList.add("page-2-hidden");
                    if (resendCodeButton) resendCodeButton.classList.add("page-2-hidden");
                    if (continueButton) continueButton.classList.remove("page-3-hidden");
                    document.querySelectorAll(".resend-row").forEach(row => row.classList.add("page-2-hidden"));
                }
            };

            if (sendCodeButton && !sendCodeButton.dataset.pageHandlerAttached) {
                sendCodeButton.addEventListener("click", () => {
                    setTimeout(() => setPage(2), 100);
                });
                sendCodeButton.dataset.pageHandlerAttached = "true";
            }

            if (verifyCodeButton && !verifyCodeButton.dataset.pageHandlerAttached) {
                verifyCodeButton.addEventListener("click", () => {
                    setTimeout(() => setPage(3), 100);
                });
                verifyCodeButton.dataset.pageHandlerAttached = "true";
            }

            const setButtonState = (button, enabled) => {

                if (!button) {
                    return;
                }

                button.disabled = !enabled;

                button.style.backgroundColor =
                    enabled ? "#094074" : "#E1DFD9";

                button.style.color =
                    enabled ? "#FFFFFF" : "#a3a3a3";

                button.style.cursor =
                    enabled ? "pointer" : "not-allowed";
            };

            const updateButtonState = () => {

                const hasEmail =
                    emailInput?.value.trim() !== "";

                const hasCode =
                    verificationCodeInput?.value.trim() !== "";

                const hasPasswords =
                    newPasswordInput?.value.trim() !== "" &&
                    confirmPasswordInput?.value.trim() !== "";

                const changeClaimsVisible =
                    changeClaimsButton &&
                    getComputedStyle(changeClaimsButton).display !== "none";

                setButtonState(sendCodeButton, hasEmail);
                setButtonState(verifyCodeButton, hasCode);
                setButtonState(
                    continueButton,
                    hasPasswords || changeClaimsVisible
                );
            };

            [emailInput,
             verificationCodeInput,
             newPasswordInput,
             confirmPasswordInput].forEach(input => {

                if (input && !input.dataset.listenerAttached) {

                    input.addEventListener("input", updateButtonState);

                    input.dataset.listenerAttached = "true";
                }
            });

            updateButtonState();

            const cancelBtn = document.getElementById("cancel");

            if (cancelBtn) {
                cancelBtn.textContent = "Back to Sign in";
            }

            if (!window.pageInitialized) {
                setPage(1);
                window.pageInitialized = true;
            }
        }

        const observer = new MutationObserver(() => {
            customizeB2CUI();
        });

        observer.observe(document.body, {
            childList: true,
            subtree: true
        });

        setTimeout(customizeB2CUI, 10);
        setTimeout(customizeB2CUI, 200);
        setTimeout(customizeB2CUI, 500);
    </script>
</head>

<body>

    <main class="page">

        <section class="card">

            <div class="brand">

                <div class="logo">
                    <img class="companyLogo"
                        data-tenant-branding-logo="true"
                        src="https://stackeducation.github.io/custom_UI/v3-fp/stack-logo.svg"
                        width="179"
                        height="48"
                        alt="Company Logo">
                </div>

                <div class="custom-heading">
                    <h1>forgot your password?</h1>
                    <p>verify your email to reset the password</p>
                </div>

            </div>

            <div class="form-wrapper">
                <div id="api" data-name="SelfAsserted" role="main"></div>
            </div>

        </section>

    </main>

    <footer class="footer">
        2026 Stack AI, Inc.
    </footer>

  

</body>

</html>
