<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <title>Forgot Password</title>

    <style>
        :root {
            --page-bg: #F8F7F5;
            --card-bg: #ffffff;
            --card-border: #f5a631;
            --card-border-light: #FFD089;
            --angle: 0deg;
            --text-primary: #111111;
            --text-secondary: #3c372f;
            --text-tertiary: #6b6560;
            --text-disabled: #a3a3a3;
            --navy: #094074;
            --input-border: #c8c5be;
            --button-disabled: #e1dfd9;
        }

        html::-webkit-scrollbar {
            display: none;
        }

        html {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: "Inter", "DM Sans", "Segoe UI", Arial, sans-serif;
            font-size: 14px;
            font-weight: 400;
            line-height: 1.42857143;
            color: var(--text-primary);
            background: var(--page-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .page {
            display: flex;
            justify-content: center;
            padding: 100px 20px;
        }

        .card {
            position: relative;

            width: 565px;
            max-width: 92vw;

            padding: 56px;

            border-radius: 16px;

            display: flex;
            flex-direction: column;
            gap: 32px;

            background:
                linear-gradient(var(--card-bg), var(--card-bg)) padding-box,

                conic-gradient(from var(--border-angle),

                    transparent 0deg,
                    transparent 220deg,

                    rgba(245, 166, 49, 0.12) 250deg,
                    rgba(255, 208, 137, 0.45) 270deg,
                    #fff4df 285deg,
                    var(--card-border-light) 300deg,
                    var(--card-border) 320deg,
                    var(--card-border) 340deg,

                    rgba(245, 166, 49, 0.25) 350deg,
                    transparent 360deg) border-box;

            border: 1.5px solid transparent;

            box-shadow:
                0 0 20.5714px rgba(245, 166, 49, 0.12);

            animation: border-angle-rotate 5s linear infinite;
        }

        /* Smooth animated CSS variable */
        @property --border-angle {
            syntax: "<angle>";
            initial-value: 0deg;
            inherits: false;
        }

        @keyframes border-angle-rotate {
            from {
                --border-angle: 0deg;
            }

            to {
                --border-angle: 360deg;
            }
        }

        .brand {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .logo {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            height: 48px;
        }

        .custom-heading {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .custom-heading h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: lowercase;
        }

        .custom-heading p {
            margin: 0;
            font-size: 12px;
            color: var(--text-tertiary);
        }

        .form-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .footer {
            position: absolute;
            bottom: 15px;
            text-align: center;
            color: var(--text-disabled);
            font-size: 12px;
        }

        .extension_tenantName_li,
        .extension_userRole_li,
        .extension_documentSources_li,
        .displayName_li,
        .extension_displayName_li {
            display: none;
        }

        .intro,
        .heading,
        .divider,
        .helpLink,
        .attrEntry .verificationSuccessText,
        .entry .working,
        .buttons:first-child,
        .verifying-modal {
            display: none !important;
        }

        #api {
            width: 100%;
        }

        #attributeList ul,
        .entry,
        #localAccountForm .entry .entry-item {
            display: flex;
            flex-direction: column;
            margin: 0;
            padding: 0;
            width: 100%;
            gap: 8px;
        }

        .entry {
            gap: 48px;
        }

        #attributeList ul .attrEntry {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 0;
            width: 100%;
        }

        #attributeList ul li,
        #localAccountForm .entry .entry-item {
            list-style: none;
            /* margin: 0; */
        }

        #attributeList ul li label,
        .entry-item label {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-primary);
        }

        #attributeList ul li input,
        .entry-item input {
            width: 100%;
            height: 40px;
            border: 1px solid var(--input-border);
            border-radius: 4px;
            padding: 0 12px;
            color: var(--text-primary);
            font-size: 16px;
            background: #ffffff;
        }

        .password-field {
            position: relative;
            width: 100%;
        }

        .password-field input {
            padding-right: 44px;
        }

        .password-toggle {
            position: absolute;
            top: 50%;
            right: 8px;
            width: 24px;
            height: 24px;
            transform: translateY(-50%);
            border: none;
            border-radius: 4px;
            background: #ffffff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0;
            cursor: pointer;
        }

        .password-toggle img {
            width: 16px;
            height: 16px;
        }

        #attributeList ul li input::placeholder,
        .entry-item input::placeholder {
            color: var(--text-disabled);
        }

        #attributeList ul li input:-webkit-autofill,
        #attributeList ul li input:-webkit-autofill:hover,
        #attributeList ul li input:-webkit-autofill:focus,
        #attributeList ul li input:-webkit-autofill:active,
        .entry-item input:-webkit-autofill,
        .entry-item input:-webkit-autofill:hover,
        .entry-item input:-webkit-autofill:focus,
        .entry-item input:-webkit-autofill:active {
            -webkit-box-shadow: 0 0 0 1000px #ffffff inset !important;
            box-shadow: 0 0 0 1000px #ffffff inset !important;
            -webkit-text-fill-color: var(--text-primary) !important;
            font-size: 16px !important;
            transition: background-color 9999s ease-in-out 0s;
            border-radius: 4px;
        }

        #localAccountForm .error,
        #api #attributeVerification .error {
            color: #b00;
            text-align: left;
            margin: 0;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 24px;
            align-items: center;
        }

        .buttons button {
            width: 100%;
            height: 48px;
            border-radius: 6px;
            border: none;
            outline: none;
            font-size: 16px;
            font-weight: 500;
            text-transform: uppercase;
        }

        .changeClaims {
            background: var(--navy);
            color: #ffffff;
            cursor: pointer;
        }

        .buttons #cancel {
            width: auto;
            height: auto;
            padding: 0;
            background: none;
            border: none;
            color: var(--navy);
            font-size: 16px;
            font-weight: 500;
            text-transform: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
        }

        .buttons #cancel::before {
            content: "";
            width: 16px;
            height: 16px;
            display: inline-block;
            background: no-repeat center / contain url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='16'%20height='16'%20viewBox='0%200%2024%2024'%20fill='none'%3E%3Cpath%20d='M20%2012H5'%20stroke='%23094074'%20stroke-width='2'%20stroke-linecap='round'/%3E%3Cpath%20d='M12%2019L5%2012L12%205'%20stroke='%23094074'%20stroke-width='2'%20stroke-linecap='round'%20stroke-linejoin='round'/%3E%3C/svg%3E");
        }

        .EmailBox,
        .TextBox {
            margin-bottom: 24px
        }

        .buttons:has(#continue):has(#cancel) {
            margin-top: 24px;
        }

        .resend-row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            width: 100%;
            font-size: 14px;
            color: var(--text-tertiary);
        }

        .resend-helper {
            color: var(--text-tertiary);
        }

        .resend-link {
            background: none;
            border: none;
            padding: 0;
            color: var(--navy);
            font-size: 12px;
            font-weight: 500;
            height: max-content !important;
            text-transform: lowercase !important;
            width: max-content !important;
            cursor: pointer;
        }


        @media (max-width: 600px) {
            .card {
                padding: 40px 24px;
            }
        }
    </style>

    <script defer>
        function customizeB2CUI() {
            const emailInput = document.getElementById("email");
            const verificationCodeInput = document.getElementById("emailVerificationCode");
            const newPasswordInput = document.getElementById("newPassword");
            const confirmPasswordInput = document.getElementById("reenterPassword");
            const sendCodeButton = document.getElementById("emailVerificationControl_but_send_code");
            const verifyCodeButton = document.getElementById("emailVerificationControl_but_verify_code");
            const resendCodeButton = document.getElementById("emailVerificationControl_but_send_new_code");
            const continueButton = document.getElementById("continue");
            const changeClaimsButton = document.getElementById("emailVerificationControl_but_change_claims");

            if (verifyCodeButton) {
                verifyCodeButton.textContent = "Verify";
            }

            if (resendCodeButton) {
                resendCodeButton.textContent = "Resend code";
            }

            if (verifyCodeButton && resendCodeButton && !resendCodeButton.dataset.repositioned) {
                const resendRow = document.createElement("div");
                resendRow.className = "resend-row";

                const helperText = document.createElement("span");
                helperText.className = "resend-helper";
                helperText.textContent = "Didn't receive the code?";

                resendCodeButton.classList.add("resend-link");

                resendRow.appendChild(helperText);
                resendRow.appendChild(resendCodeButton);
                verifyCodeButton.parentNode.insertBefore(resendRow, verifyCodeButton);
                resendCodeButton.dataset.repositioned = "true";
            }

            const attachPasswordToggle = (input) => {
                if (!input || input.dataset.toggleAttached) {
                    return;
                }

                const wrapper = document.createElement("div");
                wrapper.className = "password-field";

                const toggleButton = document.createElement("button");
                toggleButton.type = "button";
                toggleButton.className = "password-toggle";
                toggleButton.setAttribute("aria-label", "Show password");
                toggleButton.innerHTML =
                    "<img src='https://stackeducation.github.io/custom_UI/v3-fp/eye-open-icon.svg' alt='' aria-hidden='true' />";

                input.parentNode.insertBefore(wrapper, input);
                wrapper.appendChild(input);
                wrapper.appendChild(toggleButton);

                toggleButton.addEventListener("click", () => {
                    const isHidden = input.type === "password";
                    input.type = isHidden ? "text" : "password";
                    toggleButton.setAttribute("aria-label", isHidden ? "Hide password" : "Show password");
                    const icon = toggleButton.querySelector("img");
                    if (icon) {
                        icon.src = isHidden
                            ? "https://stackeducation.github.io/custom_UI/v3-fp/eye-closed-icon.svg"
                            : "https://stackeducation.github.io/custom_UI/v3-fp/eye-open-icon.svg";
                    }
                });

                input.dataset.toggleAttached = "true";
            };

            const syncPasswordToggles = () => {
                attachPasswordToggle(document.getElementById("newPassword"));
                attachPasswordToggle(document.getElementById("reenterPassword"));
            };

            syncPasswordToggles();

            const setButtonState = (button, enabled) => {

                if (!button) {
                    return;
                }

                if (button.id === "continue") {
                    const newPasswordInput = document.getElementById("newPassword");
                    const confirmPasswordInput = document.getElementById("reenterPassword");
                    const changeClaimsButton = document.getElementById("emailVerificationControl_but_change_claims");
                    const passwordStepVisible =
                        newPasswordInput &&
                        confirmPasswordInput &&
                        newPasswordInput.offsetParent !== null &&
                        confirmPasswordInput.offsetParent !== null;
                    const changeEmailStepVisible =
                        changeClaimsButton &&
                        changeClaimsButton.offsetParent !== null;

                    if (passwordStepVisible) {
                        const passwordsEntered = newPasswordInput.value.trim() !== "" && confirmPasswordInput.value.trim() !== "";
                        button.style.display = "block";
                        button.disabled = !passwordsEntered;
                        button.style.backgroundColor = passwordsEntered ? "#094074" : "#E1DFD9";
                        button.style.color = passwordsEntered ? "#FFFFFF" : "#a3a3a3";
                        button.style.cursor = passwordsEntered ? "pointer" : "not-allowed";
                        return;
                    }

                    if (changeEmailStepVisible) {
                        button.style.display = "block";
                        button.disabled = false;
                        button.style.backgroundColor = "#094074";
                        button.style.color = "#FFFFFF";
                        button.style.cursor = "pointer";
                        return;
                    }

                    button.style.display = "none";
                    button.disabled = true;
                    return;
                }

                if (button.id === "emailVerificationControl_but_verify_code") {
                    const verificationCodeInput = document.getElementById("emailVerificationCode");
                    const shouldShow = verificationCodeInput && verificationCodeInput.offsetParent !== null;

                    if (shouldShow) {
                        button.style.display = "block";
                        button.disabled = !enabled;
                        button.style.backgroundColor = enabled ? "#094074" : "#E1DFD9";
                        button.style.color = enabled ? "#FFFFFF" : "#a3a3a3";
                        button.style.cursor = enabled ? "pointer" : "not-allowed";
                    }
                    else {
                        button.style.display = "none";
                    }
                    return;
                }

                if (button.id === "emailVerificationControl_but_send_code") {
                    const verificationCodeInput = document.getElementById("emailVerificationCode");
                    const changeClaimsButton = document.getElementById("emailVerificationControl_but_change_claims");
                    const shouldHide =
                        (verificationCodeInput &&
                        verificationCodeInput.offsetParent !== null)
                        ||
                        (changeClaimsButton &&
                        changeClaimsButton.offsetParent !== null);

                    if (shouldHide) {
                        button.style.display = "none";
                    }
                    else {
                        button.style.display = "block";
                        button.disabled = !enabled;
                        button.style.backgroundColor = enabled ? "#094074" : "#E1DFD9";
                        button.style.color = enabled ? "#FFFFFF" : "#a3a3a3";
                        button.style.cursor = enabled ? "pointer" : "not-allowed";
                    }
                    return;
                }
                button.disabled = !enabled;
                button.style.display = "block";
                button.style.backgroundColor = enabled ? "#094074" : "#E1DFD9";
                button.style.color = enabled ? "#FFFFFF" : "#a3a3a3";
                button.style.cursor = enabled ? "pointer" : "not-allowed";

                const resendRow = button.closest(".resend-row");
                if (resendRow) {
                    resendRow.style.display = enabled ? "flex" : "none";
                }
            };

            const updateResendRowVisibility = () => {
                if (!resendCodeButton) {
                    return;
                }

                const resendRow = resendCodeButton.closest(".resend-row");
                if (resendRow) {
                    resendRow.style.display = getComputedStyle(resendCodeButton).display === "none" ? "none" : "flex";
                }
            };

            const updateButtonState = () => {
                const currentEmailInput = document.getElementById("email");
                const currentVerificationCodeInput = document.getElementById("emailVerificationCode");
                const currentNewPasswordInput = document.getElementById("newPassword");
                const currentConfirmPasswordInput = document.getElementById("reenterPassword");
                const currentChangeClaimsButton = document.getElementById("emailVerificationControl_but_change_claims");

                if (!currentEmailInput && !currentVerificationCodeInput && !currentNewPasswordInput && !currentConfirmPasswordInput && !currentChangeClaimsButton) {
                    return;
                }

                const hasEmail = currentEmailInput?.value.trim() !== "";
                const hasCode = currentVerificationCodeInput && currentVerificationCodeInput.value.trim() !== "";
                const hasPasswords = currentNewPasswordInput && currentConfirmPasswordInput
                    ? currentNewPasswordInput.value.trim() !== "" && currentConfirmPasswordInput.value.trim() !== ""
                    : false;
                const changeClaimsVisible = currentChangeClaimsButton
                    ? getComputedStyle(changeClaimsButton).display !== "none"
                    : false;
                syncPasswordToggles();
                setButtonState(sendCodeButton, hasEmail);
                setButtonState(verifyCodeButton, hasCode);
                setButtonState(continueButton, hasPasswords || changeClaimsVisible);
                updateResendRowVisibility();

            };

            if (emailInput && !emailInput.dataset.stateListenerAttached) {
                emailInput.addEventListener("input", updateButtonState);
                emailInput.dataset.stateListenerAttached = "true";
            }

            if (verificationCodeInput && !verificationCodeInput.dataset.stateListenerAttached) {
                verificationCodeInput.addEventListener("input", updateButtonState);
                verificationCodeInput.dataset.stateListenerAttached = "true";
            }

            if (newPasswordInput && !newPasswordInput.dataset.stateListenerAttached) {
                newPasswordInput.addEventListener("input", updateButtonState);
                newPasswordInput.dataset.stateListenerAttached = "true";
            }

            if (confirmPasswordInput && !confirmPasswordInput.dataset.stateListenerAttached) {
                confirmPasswordInput.addEventListener("input", updateButtonState);
                confirmPasswordInput.dataset.stateListenerAttached = "true";
            }

            if (!document.body.dataset.stateListenerAttached) {
                document.body.addEventListener("input", updateButtonState);
                document.body.dataset.stateListenerAttached = "true";
            }

            if (changeClaimsButton && !changeClaimsButton.dataset.stateObserverAttached) {
                const observer = new MutationObserver(() => updateButtonState());
                observer.observe(changeClaimsButton, {
                    attributes: true,
                    attributeFilter: ["style", "class", "aria-hidden"]
                });
                changeClaimsButton.dataset.stateObserverAttached = "true";
            }

            updateButtonState();

            const cancelBtn = document.getElementById("cancel");

            if (cancelBtn) {
                cancelBtn.textContent = "Back to Sign in";
            }
        }

        setTimeout(customizeB2CUI, 10);
        // Backup retry
        setTimeout(customizeB2CUI, 200);

    </script>
</head>

<body>
    <main class="page">
        <section class="card">
            <div class="brand">
                <div class="logo">
                    <img class="companyLogo" data-tenant-branding-logo="true"
                        src="https://stackeducation.github.io/custom_UI/v3-fp/stack-logo.svg" width="179" height="48"
                        alt="Company Logo">
                </div>
                <div class="custom-heading">
                    <h1>forgot your password?</h1>
                    <p>verify your email to reset the password</p>
                </div>
            </div>

            <div class="form-wrapper">
                <div id="api" data-name="SelfAsserted" role="main"></div>
            </div>
        </section>
    </main>

    <footer class="footer">
        © 2026 Stack AI, Inc.
    </footer>
</body>

</html>
