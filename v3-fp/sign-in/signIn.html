<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Sign In</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />

    <style>
        :root {
            --page-bg: #F8F7F5;
            --card-bg: #ffffff;
            --card-border: #f5a631;
            --card-border-light: #FFD089;
            --text-primary: #111111;
            --text-disabled: #a3a3a3;
            --navy: #094074;
            --input-border: #c8c5be;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100%;
            font-family: "Inter", sans-serif;
            background: var(--page-bg);
        }

        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        .page {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .card {
            width: 565px;
            max-width: 92vw;
            padding: 56px;
            border-radius: 16px;
            background: white;
            border: 1px solid #f5a631;
            box-shadow: 0 0 20px rgba(245, 166, 49, 0.12);
            display: flex;
            flex-direction: column;
            gap: 32px;
        }

        .brand {
            display: flex;
            justify-content: center;
        }

        .custom-heading {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .custom-heading h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 600;
        }

        .custom-heading p {
            margin: 0;
            font-size: 13px;
            color: #777;
        }

        .form-wrapper {
            width: 100%;
        }

        /* Hide default B2C flicker quickly */
        .intro,
        .heading,
        .divider,
        .helpLink,
        .verifying-modal,
        .attrEntry .verificationSuccessText,
        .entry .working,
        .entry .entry-item .error,
        .error.pageLevel,
        .extension_tenantName_li,
        .extension_userRole_li,
        .extension_documentSources_li,
        .displayName_li,
        .extension_displayName_li {
            display: none !important;
        }

        #api {
            width: 100%;
        }

        /* Inputs */

        .entry,
        #attributeList ul,
        #localAccountForm .entry .entry-item {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .entry {
            gap: 16px;
        }

        #attributeList ul li,
        #localAccountForm .entry .entry-item {
            list-style: none;
        }

        .entry-item label {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .entry-item input {
            width: 100%;
            height: 44px;
            border: 1px solid var(--input-border);
            border-radius: 6px;
            padding: 0 12px;
            font-size: 15px;
        }

        .entry-item input::placeholder {
            color: var(--text-disabled);
        }

        /* Password Toggle */

        .password-field {
            position: relative;
        }

        .password-field input {
            padding-right: 44px;
        }

        .password-toggle {
            position: absolute;
            right: 10px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .password-toggle img {
            width: 18px;
            height: 18px;
        }

        /* Forgot Password */

        #forgotPassword {
            align-self: flex-end;
            color: var(--navy);
            text-decoration: none;
            font-size: 14px;
            margin-top: 6px;
        }

        /* Buttons */

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 16px;
        }

        .buttons button {
            width: 100%;
            height: 48px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        #next {
            background: #E1DFD9;
            color: #999;
        }

        #next.enabled {
            background: #094074;
            color: white;
        }

        #cancel {
            display: none !important;
        }

        .footer {
            padding: 16px;
            font-size: 12px;
            color: #999;
        }

        @media (max-width: 600px) {
            .card {
                padding: 32px 20px;
            }
        }
    </style>
</head>

<body>

    <main class="page">
    <section class="card">

        <div class="brand">
            <img
                class="companyLogo"
                data-tenant-branding-logo="true"
                src="https://stackeducation.github.io/custom_UI/v2/stack-logo.svg"
                width="160"
                height="48"
                alt="Company Logo"
            />
        </div>

        <div class="custom-heading">
            <h1>Welcome back</h1>
            <p>Sign in to incline</p>
        </div>

        <div class="form-wrapper">
            <div id="api"></div>
        </div>

    </section>
    </main>

    <footer class="footer">
        © 2026 Stack AI, Inc.
    </footer>

    <script>
        (function () {

        function customizeB2CUI() {

            const emailInput = document.getElementById("email");
            const passwordInput = document.getElementById("password");
            const signInButton = document.getElementById("next");
            const forgotPasswordLink = document.getElementById("forgotPassword");

            if (emailInput) {
                emailInput.placeholder = "Enter your email";
            }

            if (passwordInput) {
                passwordInput.placeholder = "Enter Password";
            }

            if (forgotPasswordLink) {
                forgotPasswordLink.textContent = "Forgot Password?";
            }

            // Password Toggle
            if (
                passwordInput &&
                !passwordInput.dataset.toggleAttached
            ) {
                const wrapper = document.createElement("div");
                wrapper.className = "password-field";

                passwordInput.parentNode.insertBefore(wrapper, passwordInput);

                wrapper.appendChild(passwordInput);

                const toggleButton = document.createElement("button");
                toggleButton.type = "button";
                toggleButton.className = "password-toggle";

                toggleButton.innerHTML = `
                    <img
                        src="https://stackeducation.github.io/custom_UI/v2/eye-open-icon.svg"
                        alt="toggle"
                    />
                `;

                wrapper.appendChild(toggleButton);

                toggleButton.addEventListener("click", () => {

                    const hidden = passwordInput.type === "password";

                    passwordInput.type = hidden ? "text" : "password";

                    toggleButton.querySelector("img").src = hidden
                        ? "https://stackeducation.github.io/custom_UI/v2/eye-closed-icon.svg"
                        : "https://stackeducation.github.io/custom_UI/v2/eye-open-icon.svg";
                });

                passwordInput.dataset.toggleAttached = "true";
            }

            // Button state
            function updateButtonState() {

                if (!emailInput || !passwordInput || !signInButton) {
                    return;
                }

                const ready =
                    emailInput.value.trim() &&
                    passwordInput.value.trim();

                signInButton.disabled = !ready;

                if (ready) {
                    signInButton.classList.add("enabled");
                } else {
                    signInButton.classList.remove("enabled");
                }
            }

            if (emailInput && !emailInput.dataset.listenerAttached) {
                emailInput.addEventListener("input", updateButtonState);
                emailInput.dataset.listenerAttached = "true";
            }

            if (passwordInput && !passwordInput.dataset.listenerAttached) {
                passwordInput.addEventListener("input", updateButtonState);
                passwordInput.dataset.listenerAttached = "true";
            }

            updateButtonState();

            // Move forgot password link
            const passwordEntryItem =
                document.querySelector(".entry .entry-item:nth-of-type(2)");

            if (
                passwordEntryItem &&
                forgotPasswordLink &&
                forgotPasswordLink.parentElement !== passwordEntryItem
            ) {
                passwordEntryItem.appendChild(forgotPasswordLink);
            }
        }

        // Faster rendering fix
        const observer = new MutationObserver(() => {
            customizeB2CUI();
        });

        observer.observe(document.body, {
            childList: true,
            subtree: true
        });

        document.addEventListener("DOMContentLoaded", customizeB2CUI);

    })();
    </script>

</body>
</html>
